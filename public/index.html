// HPC variants that aren't really alternatives to each other).

  'd-cell': ['ER34615', 'ER34615M', 'ER34615_HPC1530'],     // D-cell options: bobbin / spiral / hybrid

function familyForCell(cellKey) {
  for (const [fam, cells] of Object.entries(CELL_FAMILIES)) {
    if (cells.includes(cellKey)) return fam;
  }
  return null;
}

function compareSetFor(cellKey) {
  const fam = familyForCell(cellKey);
  if (fam) return CELL_FAMILIES[fam];
  return [cellKey];
}

// =============================================================================
// PHYSICS — CALIBRATED
// =============================================================================

// Peukert-style capacity derating, fitted to Ultralife ER34615 datasheet:
//   I=0.2mA -> 18Ah, I=3mA -> 19Ah, I=60mA -> 10Ah, I=100mA -> 8Ah
// Fit: C(I) = C_rated * min(1, (I_crit/I)^alpha)
// Result: I_crit = 13.8 mA, alpha = 0.437   (residuals all < 6%)
const PEUKERT_ICRIT_mA = 13.8;
const PEUKERT_ALPHA = 0.437;

function peukertFactor(avgCurrent_mA) {
  if (avgCurrent_mA <= PEUKERT_ICRIT_mA) return 1.0;
  return Math.pow(PEUKERT_ICRIT_mA / avgCurrent_mA, PEUKERT_ALPHA);
}

// Temperature capacity factor (unchanged, from published derating curves)
function capacityFactor(T) {
  if (T >= 25) return 1.0 - (T - 25) * 0.002;
  if (T >= 0)  return 1.0 - (25 - T) * 0.002;
  if (T >= -20) return 0.95 - (-T) * 0.0075;
  if (T >= -40) return 0.80 - (-20 - T) * 0.0125;
  return Math.max(0.30, 0.55 - (-40 - T) * 0.008);
}
function resistanceFactor(T) {
  if (T >= 25) return 1.0;
  if (T >= 0) return 1.0 + (25 - T) * 0.02;
  if (T >= -20) return 1.5 + (-T) * 0.04;
  if (T >= -40) return 2.3 + (-20 - T) * 0.12;
  return 4.7 + (-40 - T) * 0.15;
}

// =============================================================================
// KINETIC OVERPOTENTIAL (activation polarisation)
// =============================================================================
// Fitted to 16 Ultralife V-vs-T datapoints across -40°C to +60°C and 0.2-35 mA
// Final parameters: b0=0.108 V/decade, n=5.74, I_ref=0.43 mA
// RMS error = 30 mV (excellent — roughly within datasheet graph reading accuracy)
// Models the fact that at low temperatures, electrochemical reactions slow down,
// creating an extra voltage drop on top of pure IR drop. This is what actually
// kills devices at low temperature — the IR model alone explains <25% of the sag.
function kineticOverpotential(I_mA, T_C) {
  if (I_mA < 0.01) return 0;
  const T_K = T_C + 273.15;
  const b_T = 0.108 * Math.pow(298.15 / T_K, 5.74);  // Tafel slope, T-dependent
  const I_ref = 0.43;  // mA, below this no overpotential
  if (I_mA <= I_ref) return 0;
  return b_T * Math.log10(I_mA / I_ref);
}

// =============================================================================
// VOLTAGE-DEPENDENT PEAK CURRENT (v3.5 — peer-review correction)
// =============================================================================
// Cellular modems (nRF91x1 LTE-M/NB-IoT, Telit ME310G1, SIMCOM) draw roughly
// constant RF output power, not constant current. So as the battery voltage
// drops, the modem pulls more current to maintain the same TX power.
//
// Reference datapoint: nRF9151 @ 23dBm PC3, pulls ~350mA at 3.7V fresh battery.
// At 3.0V terminal (older, colder, or higher internal resistance), the same
// modem pulls ~430mA (17-22% more). Peer review flagged this was missing and
// would favour hybrid (HPC) batteries even more heavily.
//
// Model: I_actual(V) = I_nominal * (V_nominal / V_terminal)
// where V_nominal is the voltage at which pulseCurrent_mA was specified.
// Convention: user enters pulse current assuming fresh 3.6V nominal.
// Only applied to "current sink" style loads (modems, high-power RF);
// linear regulators / buck converters see this effect too but less pronounced.
//
// DEFAULT: disabled for general loads, enabled for known-modem presets.
// User can toggle per-project in Custom Modifiers.
const V_NOMINAL_REF = 3.6;

function scalePeakCurrentByVoltage(I_nominal_mA, V_terminal, enable) {
  if (!enable || V_terminal < 1.5) return I_nominal_mA;
  // Bound the ratio to prevent silly amplification at battery death
  const ratio = Math.min(1.8, V_NOMINAL_REF / V_terminal);
  return I_nominal_mA * ratio;
}

// =============================================================================
// INTERNAL RESISTANCE EVOLUTION vs DEPTH-OF-DISCHARGE and AGE
// =============================================================================
// Calibrated against MDPI Energies 2024 (Sun et al.) EIS measurements:
//   - Fresh stored cell: high R (passivation film, 2-5× baseline)
//   - Once loaded, passivation breaks: R drops to minimum around 10-30% DoD
//   - Mid discharge (30-70% DoD): gradual climb
//   - EoL (>80% DoD): sharp rise as LiCl blocks cathode pores
// Plus saturating Arrhenius-accelerated ageing component
function internalResistance_mOhm(cell, soc, ageYears, avgTemp_C) {
  const R0 = cell.internalR_mOhm_25C * resistanceFactor(avgTemp_C);

  // DoD component — dip-then-rise shape matching MDPI Fig 14
  const dod = 1 - soc;
  let R_dod_mult;
  if (dod < 0.05) R_dod_mult = 1.15;                       // fresh, slight passivation
  else if (dod < 0.30) R_dod_mult = 1.15 - dod * 1.5;      // passivation breaking down -> drops to ~0.70
  else if (dod < 0.70) R_dod_mult = 0.70 + (dod - 0.3) * 1.0; // gentle climb to ~1.1
  else if (dod < 0.90) R_dod_mult = 1.1 + (dod - 0.7) * 8;    // steeper climb
  else R_dod_mult = 2.7 + (dod - 0.9) * 50;                   // cliff at EoL

  // Age component — Arrhenius-accelerated passivation film thickening
  const ageArrhenius = Math.pow(2, (avgTemp_C - 25) / 10);
  const ageEffect_pct = (1 - Math.exp(-ageYears / 2.5)) * 0.30 * ageArrhenius;
  const R_age_mult = 1 + ageEffect_pct;

  return R0 * R_dod_mult * R_age_mult;
}

// =============================================================================
// PASSIVATION (TMV) PREDICTOR
// =============================================================================
// Calibrated against MDPI Fig 15b (Sun et al. 2024): cell stored 8913h @ 70°C,
// loaded with 750Ω at room temp, observed TMV = 1.6V (dip ~2.1V below OCV).
// With 70°C Arrhenius factor of ~22×, storage is ~23 equivalent years at 25°C,
// so film maturity ≈ 1.0. Required amplification factor = 5.2× fresh passivation.
// Previous v3 used 3.5× — under-predicted extreme cases. Now 5.2×.
// SER Battery: "passivation grows fast first 1-2 years, then plateaus" confirms
// tau ~ 1.5 years at 25°C (gives 49% maturity at 1yr, 74% at 2yr).
function predictPassivation(cell, storageMonths, storageTemp_C, dischargeCurrent_mA) {
  if (cell.hpc_capacity_mAh) {
    return { tmv_V: cell.ocv - 0.05, dip_V: 0.05, recovery_s: 1, severity: 'negligible',
             filmMaturity: 0,
             explanation: 'The HPC (capacitor) supplies current instantly, so the battery never has to break through its own passivation layer. Voltage delay is effectively eliminated.' };
  }

  // Film thickness growth: saturating exponential with Arrhenius (tau=1.5yr @25°C)
  const t_years = storageMonths / 12;
  const arrhenius = Math.pow(2, (storageTemp_C - 25) / 10);
  const filmMaturity = (1 - Math.exp(-t_years * arrhenius / 1.5));
  // Base passivation voltage drop amplified by film growth (5.2× max, calibrated to MDPI)
  const maxDip = cell.passivation_V * (1 + filmMaturity * 5.2);

  // Current effect — high current punches through faster (less visible TMV duration,
  // but deeper initial dip because IR + activation overpotential stack up)
  const currentFactor = Math.min(2.0, Math.max(0.3, Math.log10(dischargeCurrent_mA + 1) / 2));
  const actualDip_V = maxDip * currentFactor;
  const tmv_V = Math.max(1.0, cell.ocv - (dischargeCurrent_mA/1000)*(cell.internalR_mOhm_25C/1000) - actualDip_V);

  // Recovery time: faster with current (breakthrough kinetics), slower with film thickness
  const baseTau = cell.passivation_tau_s;
  const recovery_s = baseTau * (1 + filmMaturity * 8) / Math.max(0.2, Math.log10(dischargeCurrent_mA + 1));

  // Severity classification
  let severity, explanation;
  if (actualDip_V < 0.15) {
    severity = 'negligible';
    explanation = `Fresh or short-stored cells show minimal voltage delay. Your device will power up normally.`;
  } else if (tmv_V < cell.cutoffV) {
    severity = 'severe';
    explanation = `The voltage will briefly drop below ${cell.cutoffV}V when first loaded. Your device may reset or fail to boot on first transmission. Depassivate before deploying.`;
  } else if (actualDip_V < 0.5) {
    severity = 'moderate';
    explanation = `Noticeable voltage dip for ${recovery_s.toFixed(0)}s on first activation. If your device has brown-out protection above 3.0V, it may fail the first transmission. Recommend depassivation.`;
  } else {
    severity = 'significant';
    explanation = `Voltage dips ${actualDip_V.toFixed(2)}V below OCV and takes ~${Math.round(recovery_s)}s to recover. Devices with strict voltage thresholds will fail. Depassivation strongly recommended.`;
  }

  return {
    tmv_V: parseFloat(tmv_V.toFixed(2)),
    dip_V: parseFloat(actualDip_V.toFixed(2)),
    recovery_s: parseFloat(recovery_s.toFixed(1)),
    filmMaturity: parseFloat(filmMaturity.toFixed(2)),
    severity,
    explanation,
  };
}

// Depassivation protocol recommendation
function recommendDepassivation(passivation, cell) {
  if (cell.hpc_capacity_mAh) return null;  // not needed
  if (passivation.severity === 'negligible') return null;

  const mAh_to_clear = passivation.filmMaturity * 50; // rough estimate
  const time_at_10mA = (mAh_to_clear / 10) * 60; // minutes
  const time_at_50mA = (mAh_to_clear / 50) * 60;

  return {
    required: passivation.severity !== 'negligible',
    protocol: `Apply a ${passivation.severity === 'severe' ? '50-100mA' : '10-30mA'} load for ${passivation.severity === 'severe' ? Math.round(time_at_50mA) : Math.round(time_at_10mA)} minutes before deployment.`,
    verification: 'Verify terminal voltage has recovered to ≥3.5V under load before disconnecting.',
    prevention: 'To avoid passivation in-field, apply a periodic wake-up pulse: 20mA for 10 seconds every week, or 60 seconds monthly.',
  };
}
function selfDischargeRate(T, basePctYear) {
  return basePctYear * Math.pow(2, (T - 25) / 10);
}
function ocvFromSoC(soc, cell) {
  if (soc > 0.95) return cell.ocv;
  if (soc > 0.10) return cell.ocv - 0.12 * (1 - soc);
  return cell.ocv - 0.12 * 0.9 - (0.10 - soc) * 14;
}
function terminalVoltage(soc, I_mA, T, elapsed_s, cell, hpcState) {
  const ocv = ocvFromSoC(soc, cell);
  const R = (cell.internalR_mOhm_25C * resistanceFactor(T)) / 1000;
  const I = I_mA / 1000;
  let V = ocv - I * R - kineticOverpotential(I_mA, T);  // includes activation polarisation
  const passRecovery = 1 - Math.exp(-elapsed_s / cell.passivation_tau_s);
  V -= cell.passivation_V * (1 - passRecovery);
  if (hpcState && cell.hpc_capacity_mAh) {
    const hpcR = cell.hpc_internalR_mOhm / 1000;
    const V_hpc = hpcState.voltage - I * hpcR;
    V = Math.max(V, V_hpc);
  }
  return Math.max(0, V);
}

// =============================================================================
// SIMULATION (now with Peukert)
// =============================================================================
function simulate({ cellKey, baseCurrent_uA, pulseCurrent_mA, pulseDuration_s,
                    pulsePeriod_s, tempProfile, durationYears, shelfMonths,
                    modifiers = {} }) {
  const cell = CELLS[cellKey];
  const totalSeconds = durationYears * 365.25 * 86400;
  const steps = 400;
  const dt = totalSeconds / steps;

  // Custom modifiers (from peer review / per-project tweaks)
  const voltageScaledModem = modifiers.voltageScaledModem !== undefined ? modifiers.voltageScaledModem : false;
  const inrushMultiplier = modifiers.inrushMultiplier || 1.0;
  const summerDutyBump = modifiers.summerDutyBump || 0;  // fractional increase in summer duty cycle
  const coldStartThresh = modifiers.coldStartThresh || null;  // °C; below this, apply cold-start inrush
  const coverageRetryMultiplier = modifiers.coverageRetryMultiplier || 1.0;  // v3.6 — retries in poor coverage

  // Effective pulse duration accounts for retries in poor coverage. Kyle flagged
  // that NB-IoT CE1 has 8× repetitions, CE2 has 128× — real deployments see
  // 2-30× active time expansion vs happy-path. Multiplier ≥1 stretches the
  // active phase of each pulse cycle, raising average current proportionally.
  const pulseDutyCycle = (pulseDuration_s * coverageRetryMultiplier) / pulsePeriod_s;
  // Nominal average current (before voltage scaling corrections)
  const avgCurrent_mA_nominal = (baseCurrent_uA / 1000) + pulseCurrent_mA * pulseDutyCycle;
  // For Peukert, use nominal — voltage scaling is second-order on the average
  const peukertFrac = peukertFactor(avgCurrent_mA_nominal);

  const shelfLoss = (cell.selfDischarge_pctYear_25C / 100) * (shelfMonths / 12);
  let remaining_mAh = cell.capacity_Ah_25C * 1000 * (1 - shelfLoss) * peukertFrac;
  const initial_mAh = cell.capacity_Ah_25C * 1000 * (1 - shelfLoss);
  const usable_mAh = initial_mAh * peukertFrac;

  const hpcCapacity = cell.hpc_capacity_mAh || 0;

  const data = [];
  let deadPoint = null;

  for (let i = 0; i <= steps; i++) {
    const t = i * dt;
    const tYears = t / (365.25 * 86400);
    const T = getTempAt(t, tempProfile);

    // Seasonal duty-cycle modifier (summer pulls more — e.g. fridge compressors, solar pumps)
    const isSummer = T > (tempProfile.meanT + 3);
    const dutyMod = isSummer ? (1 + summerDutyBump) : 1.0;

    // Average current accounting for seasonal modifier
    const avgCurrent_mA = avgCurrent_mA_nominal * dutyMod;

    const hoursInStep = dt / 3600;
    const charge_drawn_mAh = avgCurrent_mA * hoursInStep;
    const capFactor = capacityFactor(T);
    const effective_drain = charge_drawn_mAh / capFactor;
    const sdRate = selfDischargeRate(T, cell.selfDischarge_pctYear_25C) / 100;
    const sdLoss_mAh = initial_mAh * sdRate * (dt / (365.25 * 86400));

    remaining_mAh -= (effective_drain + sdLoss_mAh);

    const soc = Math.max(0, remaining_mAh / usable_mAh);
    const V_base = terminalVoltage(soc, baseCurrent_uA / 1000, T, t, cell, null);

    // Voltage-dependent peak current (peer review fix, v3.5)
    // Use the current V_base to estimate what voltage the modem sees,
    // then scale pulse current accordingly
    let I_pulse_actual = scalePeakCurrentByVoltage(pulseCurrent_mA, V_base, voltageScaledModem);
    // Cold start inrush (optional modifier)
    if (coldStartThresh !== null && T < coldStartThresh) {
      I_pulse_actual *= inrushMultiplier;
    }

    const V_pulse = terminalVoltage(
      soc, I_pulse_actual, T, t, cell,
      hpcCapacity > 0 ? { voltage: ocvFromSoC(soc, cell) } : null
    );

    // Predicted internal resistance at this age & DoD
    const R_int_mOhm = internalResistance_mOhm(cell, soc, tYears, T);

    const isDead = soc <= 0 || V_base < cell.cutoffV;
    if (isDead && !deadPoint) deadPoint = tYears;

    data.push({
      years: parseFloat(tYears.toFixed(3)),
      soc: parseFloat((soc * 100).toFixed(2)),
      V_base: parseFloat(V_base.toFixed(3)),
      V_pulse: parseFloat(V_pulse.toFixed(3)),
      I_pulse_actual: parseFloat(I_pulse_actual.toFixed(1)),
      temp: parseFloat(T.toFixed(1)),
      remaining_Ah: parseFloat((remaining_mAh / 1000).toFixed(3)),
      avgCurrent_mA: parseFloat(avgCurrent_mA.toFixed(4)),
      R_int_mOhm: parseFloat(R_int_mOhm.toFixed(1)),
      dead: isDead,
    });
    if (isDead) break;
  }
  return { data, cell, deadYears: deadPoint, initial_mAh, usable_mAh, peukertFrac, avgCurrent_mA: avgCurrent_mA_nominal };
}

function getTempAt(t_seconds, profile) {
  const year_s = 365.25 * 86400;
  const day_s = 86400;
  const yearPhase = (t_seconds % year_s) / year_s;
  const dayPhase = (t_seconds % day_s) / day_s;
  const yearly = Math.sin((yearPhase - 0.25) * 2 * Math.PI);
  const daily = Math.sin((dayPhase - 0.25) * 2 * Math.PI);
  return profile.meanT + (profile.yearAmplitude * yearly) + (profile.dayAmplitude * daily);
}

// =============================================================================
// RECOMMENDATION ENGINE — plain English
// =============================================================================
function generateRecommendation(results, params) {
  const survivors = results.filter(r => !r.deadYears || r.deadYears >= params.durationYears);
  const deaths = results.filter(r => r.deadYears && r.deadYears < params.durationYears);
  const avgI = results[0].avgCurrent_mA;

  let verdict, headline, body, tone;

  // Determine verdict tone
  if (survivors.length === 0) {
    tone = 'bad';
    headline = `No battery option lasts ${params.durationYears} years under these conditions.`;
  } else if (survivors.length === results.length) {
    tone = 'good';
    headline = `Good news — all options comfortably exceed your ${params.durationYears} year target.`;
  } else {
    tone = 'warn';
    headline = `Some options survive, some don't. Choose carefully.`;
  }

  // Build recommendation body
  const parts = [];

  // Current draw interpretation
  if (avgI < 0.5) {
    parts.push(`Your device sips power very gently (${avgI.toFixed(2)} mA average). Battery life here is mostly decided by self-discharge — how fast the battery goes flat sitting on the shelf — not by your device draining it.`);
  } else if (avgI < 5) {
    parts.push(`Your device draws modest power (${avgI.toFixed(2)} mA average). Both the battery capacity and shelf self-discharge matter roughly equally for lifespan.`);
  } else if (avgI < 30) {
    parts.push(`Your device is a moderate drinker (${avgI.toFixed(1)} mA average). Battery capacity is the main driver of lifespan — self-discharge barely matters.`);
  } else {
    parts.push(`Your device draws significant power (${avgI.toFixed(1)} mA average). At this draw, the battery can't deliver its full rated capacity — a physical limit called the Peukert effect. You'll get notably less than the "19Ah on the label" advertises.`);
  }

  // Temperature interpretation
  const minT = params.meanT - params.yearAmp - params.dayAmp;
  const maxT = params.meanT + params.yearAmp + params.dayAmp;
  if (minT < -20) {
    parts.push(`It gets very cold (${minT.toFixed(0)}°C) in this environment. Li-SOCl₂ batteries lose punch in cold — their internal resistance rises sharply, which can make high-current pulses fail even if there's plenty of energy left.`);
  }
  if (maxT > 40) {
    parts.push(`It gets hot (${maxT.toFixed(0)}°C) in this environment. Heat accelerates self-discharge — the battery will go flat faster just sitting there, roughly doubling the loss rate for every 10°C above normal.`);
  }
  if (minT >= 10 && maxT <= 35) {
    parts.push(`Your temperature environment is benign — no significant impact on battery performance expected.`);
  }

  // Specific cell recommendations — use HPC1530 as the representative hybrid
  // since it's the sensible default EW will recommend in practice
  const bobbin = results.find(r => r.key === 'ER34615');
  const spiral = results.find(r => r.key === 'ER34615M');
  const hybrid = results.find(r => r.key === 'ER34615_HPC1530') ||
                 results.find(r => r.key === 'ER34615_HPC1520') ||
                 results.find(r => r.key === 'ER34615_HPC1550');
  const apack  = results.find(r => r.key === 'ER18505M_2P');

  // Pulse assessment
  const pulseI = params.pulseCurrent_mA;
  const cellRecs = [];

  if (pulseI > 200 && bobbin && bobbin.data[0].V_pulse < 2.5) {
    cellRecs.push(`❌ **Avoid bobbin alone** — your pulse current (${pulseI} mA) is too high. The voltage will sag below the 2.0V cutoff during transmission, causing dropouts or resets.`);
  }

  if (pulseI > 400 && pulseI <= 3000) {
    cellRecs.push(`✓ **Spiral (ER34615M)** handles your ${pulseI} mA pulses well without any capacitor help.`);
  }

  if (pulseI > 200 && hybrid) {
    const hybridLife = hybrid.deadYears || params.durationYears;
    if (hybridLife >= params.durationYears) {
      cellRecs.push(`✓ **Hybrid (ER34615 + HPC)** is ideal here — gives you long-life chemistry plus capacitor-buffered pulses. HPC1530 is the sensible default; upsize to HPC1550 for harsh environments.`);
    }
  }

  if (apack && pulseI > 500) {
    cellRecs.push(`⚠ **A-cell pack (ER18505M ×2)** is compact but only rated to ~2500mA pulse. At ${pulseI} mA you're near its limit — confirm V_pulse stays above your MCU brownout.`);
  }

  if (avgI < 1 && survivors.length > 0) {
    cellRecs.push(`✓ For low-current sensors, the **bobbin cell** (ER34615) gives the cheapest Ah-per-dollar. Only upgrade to hybrid if pulse voltage is an issue.`);
  }

  if (deaths.length > 0) {
    const deadNames = deaths.map(d => d.cell.shortName).join(', ');
    cellRecs.push(`⚠ These options die before target: ${deadNames}. Check their death years in the cards above.`);
  }

  // Overall verdict
  const recommended = (() => {
    if (pulseI > 400 && hybrid && hybrid.deadYears === null) return hybrid;
    if (pulseI > 400 && spiral && spiral.deadYears === null) return spiral;
    if (avgI < 1 && bobbin && bobbin.deadYears === null) return bobbin;
    return survivors.sort((a,b) => (b.deadYears || 1e9) - (a.deadYears || 1e9))[0];
  })();

  return { tone, headline, contextParts: parts, cellRecs, recommended: recommended?.cell };
}

const LS_META_KEY = 'ew-battery-sim-meta';

// =============================================================================
// HTTP API CLIENT — server-backed persistence
// =============================================================================
// Projects live in a SQLite database on the VPS. Team members share the same
// data. Each save is also versioned in project_history (last 50 per project).
// Authentication is a shared team password, stored in a signed cookie.

const api = {
  async me() {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (!r.ok) return null;
    return r.json();
  },
  async login(username, password) {
    const r = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password }),
    });
    if (!r.ok) throw new Error((await r.json()).error || 'login failed');
    return r.json();
  },
  async logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  },
  async listProjects() {
    const r = await fetch('/api/projects', { credentials: 'include' });
    if (!r.ok) throw new Error('fetch projects failed');
    return (await r.json()).projects || {};
  },
  async createProject(proj) {
    const r = await fetch('/api/projects', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: proj.name,
        description: proj.description || '',
        data: proj,
      }),
    });
    if (!r.ok) throw new Error('create failed');
    return r.json();
  },
  async updateProject(id, proj) {
    const r = await fetch(`/api/projects/${encodeURIComponent(id)}`, {
      method: 'PUT', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: proj.name,
        description: proj.description || '',
        data: proj,
      }),
    });
    if (!r.ok) throw new Error('update failed');
    return r.json();
  },
  async deleteProject(id) {
    const r = await fetch(`/api/projects/${encodeURIComponent(id)}`, {
      method: 'DELETE', credentials: 'include',
    });
    if (!r.ok) throw new Error('delete failed');
    return r.json();
  },
  async bulkImport(projects) {
    const r = await fetch('/api/projects/bulk', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ projects }),
    });
    if (!r.ok) throw new Error('bulk import failed');
    return r.json();
  },
  async teamActivity() {
    const r = await fetch('/api/team/activity', { credentials: 'include' });
    if (!r.ok) return { users: [] };
    return r.json();
  },
  async listFeedback(projectId) {
    const qs = projectId ? `?project_id=${encodeURIComponent(projectId)}` : '';
    const r = await fetch(`/api/feedback${qs}`, { credentials: 'include' });
    if (!r.ok) throw new Error('fetch feedback failed');
    return (await r.json()).feedback || [];
  },
  async submitFeedback(projectId, comment) {
    const r = await fetch('/api/feedback', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ project_id: projectId || null, comment }),
    });
    if (!r.ok) throw new Error('submit failed');
    return r.json();
  },
  async updateFeedback(id, status, resolution_note) {
    const r = await fetch(`/api/feedback/${id}`, {
      method: 'PUT', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status, resolution_note }),
    });
    if (!r.ok) throw new Error('update failed');
    return r.json();
  },
};

// Local meta only — tracks last-export time, unsaved counter, per-browser
function loadMeta() {
  try {
    const raw = localStorage.getItem(LS_META_KEY);
    return raw ? JSON.parse(raw) : { lastExportAt: null, unsavedChanges: 0 };
  } catch (e) { return { lastExportAt: null, unsavedChanges: 0 }; }
}

function saveMeta(meta) {
  try { localStorage.setItem(LS_META_KEY, JSON.stringify(meta)); } catch (e) {}
}

function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const handleSubmit = async () => {
    if (!username.trim() || !password) return;
    setSubmitting(true); setErr('');
    try {
      await api.login(username.trim(), password);
      onLogin(username.trim());
    } catch (e) {
      setErr(e.message || 'login failed');
      setSubmitting(false);
    }
  };

  return (
    <div style={{...styles.app, display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
      <div style={{width: 360, background: '#131316', border: '1px solid #26262a', padding: 28}}>
        <div style={{fontSize: 10, letterSpacing: '0.18em', color: '#c97b4a', fontWeight: 600,
                     textTransform: 'uppercase', fontFamily: '"IBM Plex Mono", monospace'}}>
          EDEN WORTH / POWER SYSTEMS LAB
        </div>
        <h1 style={{fontSize: 22, fontWeight: 300, margin: '8px 0 6px', letterSpacing: '-0.01em',
                    fontFamily: '"IBM Plex Serif", Georgia, serif'}}>
          Battery Simulator
        </h1>
        <div style={{fontSize: 11, color: '#888', marginBottom: 20, fontFamily: '"IBM Plex Mono", monospace'}}>
          sign in with your name and the team password
        </div>
        <input type="text" placeholder="Your name (e.g. Dale)" value={username}
               onChange={e => setUsername(e.target.value)}
               onKeyDown={e => e.key === 'Enter' && handleSubmit()}
               style={{width: '100%', background: '#0a0a0b', color: '#e8e8e8',
                       border: '1px solid #333', padding: '10px 12px', fontSize: 13,
                       fontFamily: '"IBM Plex Sans", sans-serif', marginBottom: 10}} autoFocus />
        <input type="password" placeholder="Team password" value={password}
               onChange={e => setPassword(e.target.value)}
               onKeyDown={e => e.key === 'Enter' && handleSubmit()}
               style={{width: '100%', background: '#0a0a0b', color: '#e8e8e8',
                       border: '1px solid #333', padding: '10px 12px', fontSize: 13,
                       fontFamily: '"IBM Plex Sans", sans-serif', marginBottom: 14}} />
        {err && <div style={{fontSize: 12, color: '#ff7a7a', marginBottom: 10,
                              padding: '8px 10px', background: 'rgba(255,122,122,0.08)',
                              borderLeft: '2px solid #ff7a7a'}}>{err}</div>}
        <button onClick={handleSubmit} disabled={submitting || !username.trim() || !password}
                style={{width: '100%', padding: '10px 14px', background: '#c97b4a', color: '#0d0d0f',
                        border: 'none', fontSize: 12, fontWeight: 500, cursor: 'pointer',
                        fontFamily: '"IBM Plex Mono", monospace', letterSpacing: '0.08em',
                        opacity: (submitting || !username.trim() || !password) ? 0.4 : 1}}>
          {submitting ? 'SIGNING IN…' : 'SIGN IN'}
        </button>
      </div>
    </div>
  );
}

function SimulatePanel() {
  const [cellKey, setCellKey] = useState('ER34615');
  const [compareMode, setCompareMode] = useState(true);

  const [loadPreset, setLoadPreset] = useState('lorawan-hourly');
  const [baseCurrent_uA, setBase] = useState(8);
  const [pulseCurrent_mA, setPulseI] = useState(120);
  const [pulseDuration_s, setPulseDur] = useState(0.8);
  const [pulsePeriod_s, setPulsePer] = useState(3600);

  const [tempPreset, setTempPreset] = useState('melbourne-outdoor');
  const [meanT, setMeanT] = useState(15);
  const [yearAmp, setYearAmp] = useState(10);
  const [dayAmp, setDayAmp] = useState(6);

  const [durationYears, setDuration] = useState(10);
  const [shelfMonths, setShelfMonths] = useState(6);

  // Custom modifiers (v3.5) — per-project physics tweaks
  const [modifiers, setModifiers] = useState({
    voltageScaledModem: false,   // scale pulse current with battery voltage (peer review fix)
    inrushMultiplier: 1.0,        // extra current at cold-start (×)
    summerDutyBump: 0,            // fractional increase in summer duty cycle
    coldStartThresh: null,        // °C below which inrush kicks in
    coverageRetryMultiplier: 1.0, // active-time multiplier for retries in poor coverage (v3.6, Kyle)
  });

  // Project management
  const [userProjects, setUserProjects] = useState({});
  const [currentProject, setCurrentProject] = useState('');
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [saveName, setSaveName] = useState('');
  const [saveDescription, setSaveDescription] = useState('');
  const [meta, setMeta] = useState(() => loadMeta());
  const [saveStatus, setSaveStatus] = useState('');  // 'saved', 'saving', ''
  const [showExportNag, setShowExportNag] = useState(false);
  const isFirstRender = useRef(true);
  const autoSaveTimer = useRef(null);

  // Initial load from server
  useEffect(() => {
    api.listProjects().then(projects => {
      setUserProjects(projects);
      // Auto-load "last used" project if there is one
      const lastId = localStorage.getItem('ew-battery-sim-last');
      if (lastId && projects[lastId]) {
        setCurrentProject(lastId);
        applyProject(projects[lastId], true);
      }
    }).catch(err => {
      console.error('failed to load projects', err);
    });
  }, []);

  // Check if export reminder should show
  useEffect(() => {
    const daysSinceExport = meta.lastExportAt
      ? (Date.now() - new Date(meta.lastExportAt).getTime()) / 86400000
      : Infinity;
    const shouldNag = meta.unsavedChanges >= 10 || daysSinceExport >= 7;
    const hasProjects = Object.keys(userProjects).length > 0;
    setShowExportNag(shouldNag && hasProjects);
  }, [meta, userProjects]);

  const applyProject = (proj, silent = false) => {
    isFirstRender.current = silent;  // suppress auto-save triggered by this load
    // Migrate pre-v3.7 cell key if needed
    let cellKeyToApply = proj.cellKey;
    if (cellKeyToApply === 'ER34615_HPC') cellKeyToApply = 'ER34615_HPC1530';
    if (!CELLS[cellKeyToApply]) cellKeyToApply = 'ER34615';  // fallback if cell was removed
    setCellKey(cellKeyToApply);
    setCompareMode(proj.compareMode);
    setLoadPreset('custom');
    setBase(proj.baseCurrent_uA);
    setPulseI(proj.pulseCurrent_mA);
    setPulseDur(proj.pulseDuration_s);
    setPulsePer(proj.pulsePeriod_s);
    setTempPreset('custom');
    setMeanT(proj.meanT);
    setYearAmp(proj.yearAmp);
    setDayAmp(proj.dayAmp);
    setDuration(proj.durationYears);
    setShelfMonths(proj.shelfMonths);
    setModifiers(proj.modifiers || {
      voltageScaledModem: false, inrushMultiplier: 1.0,
      summerDutyBump: 0, coldStartThresh: null, coverageRetryMultiplier: 1.0,
    });
    // Backfill the new field if project was saved before v3.6
    if (proj.modifiers && proj.modifiers.coverageRetryMultiplier === undefined) {
      setModifiers(m => ({ ...m, coverageRetryMultiplier: 1.0 }));
    }
  };

  const handleProjectLoad = (key) => {
    setCurrentProject(key);
    if (!key) return;
    const proj = BUILTIN_PROJECTS[key] || userProjects[key];
    if (proj) {
      applyProject(proj);
      localStorage.setItem('ew-battery-sim-last', key);
    }
  };

  // AUTO-SAVE: debounced 2s after any slider change, but only if we have a
  // current user project loaded (not a built-in, not fresh slate)
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    if (!currentProject || BUILTIN_PROJECTS[currentProject]) return;
    if (!userProjects[currentProject]) return;

    setSaveStatus('saving');
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current = setTimeout(async () => {
      const updated = {
        ...userProjects[currentProject],
        cellKey, compareMode,
        baseCurrent_uA, pulseCurrent_mA, pulseDuration_s, pulsePeriod_s,
        meanT, yearAmp, dayAmp,
        durationYears, shelfMonths,
        modifiers,
      };
      try {
        await api.updateProject(currentProject, updated);
        setUserProjects(prev => ({ ...prev, [currentProject]: { ...updated, updatedAt: new Date().toISOString() } }));
        setSaveStatus('saved');
        const newMeta = { ...meta, unsavedChanges: (meta.unsavedChanges || 0) + 1 };
        setMeta(newMeta);
        saveMeta(newMeta);
      } catch (err) {
        setSaveStatus('error');
        console.error('auto-save failed', err);
      }
      setTimeout(() => setSaveStatus(''), 1500);
    }, 2000);

    return () => autoSaveTimer.current && clearTimeout(autoSaveTimer.current);
  }, [cellKey, compareMode, baseCurrent_uA, pulseCurrent_mA, pulseDuration_s,
      pulsePeriod_s, meanT, yearAmp, dayAmp, durationYears, shelfMonths, modifiers]);

  // Server-backed storage is always authoritative — no beforeunload race to worry about.
  // Pending auto-saves will complete naturally on next interaction or reload.

  const handleSave = async () => {
    if (!saveName.trim()) return;
    const newProjData = {
      name: saveName.trim(),
      description: saveDescription.trim(),
      builtin: false,
      cellKey, compareMode,
      baseCurrent_uA, pulseCurrent_mA, pulseDuration_s, pulsePeriod_s,
      meanT, yearAmp, dayAmp,
      durationYears, shelfMonths,
      modifiers,
    };
    try {
      const created = await api.createProject(newProjData);
      setUserProjects(prev => ({ ...prev, [created.id]: { ...newProjData, ...created } }));
      setCurrentProject(created.id);
      localStorage.setItem('ew-battery-sim-last', created.id);
    } catch (err) {
      alert('Save failed: ' + err.message);
      return;
    }
    setShowSaveDialog(false);
    setSaveName(''); setSaveDescription('');
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus(''), 1500);
  };

  const handleDelete = async (key) => {
    if (!confirm(`Delete saved project "${userProjects[key]?.name}"?`)) return;
    try {
      await api.deleteProject(key);
      setUserProjects(prev => { const { [key]:_, ...rest } = prev; return rest; });
      if (currentProject === key) setCurrentProject('');
    } catch (err) {
      alert('Delete failed: ' + err.message);
    }
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(userProjects, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ew-battery-sim-projects-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    const newMeta = { lastExportAt: new Date().toISOString(), unsavedChanges: 0 };
    setMeta(newMeta);
    saveMeta(newMeta);
    setShowExportNag(false);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        await api.bulkImport(imported);
        // Reload from server to get canonical data
        const fresh = await api.listProjects();
        setUserProjects(fresh);
        alert(`Imported ${Object.keys(imported).length} projects`);
      } catch (err) {
        alert('Import failed: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  useEffect(() => {
    if (loadPreset !== 'custom') {
      const p = LOAD_PRESETS[loadPreset];
      setBase(p.baseCurrent_uA); setPulseI(p.pulseCurrent_mA);
      setPulseDur(p.pulseDuration_s); setPulsePer(p.pulsePeriod_s);
    }
  }, [loadPreset]);

  useEffect(() => {
    if (tempPreset === 'custom') return;  // don't clobber user's custom values
    const p = TEMP_PRESETS[tempPreset];
    if (p) { setMeanT(p.meanT); setYearAmp(p.yearAmplitude); setDayAmp(p.dayAmplitude); }
  }, [tempPreset]);

  const tempProfile = { meanT, yearAmplitude: yearAmp, dayAmplitude: dayAmp };

  const results = useMemo(() => {
    const common = { baseCurrent_uA, pulseCurrent_mA, pulseDuration_s, pulsePeriod_s, tempProfile, durationYears, shelfMonths, modifiers };
    if (compareMode) {
      const set = compareSetFor(cellKey);
      return set.map(k => ({ key: k, ...simulate({ cellKey: k, ...common }) }));
    }
    return [{ key: cellKey, ...simulate({ cellKey, ...common }) }];
  }, [cellKey, compareMode, baseCurrent_uA, pulseCurrent_mA, pulseDuration_s, pulsePeriod_s, meanT, yearAmp, dayAmp, durationYears, shelfMonths, modifiers]);

  const mergedData = useMemo(() => {
    const allYears = new Set();
    results.forEach(r => r.data.forEach(d => allYears.add(d.years)));
    const sorted = [...allYears].sort((a, b) => a - b);
    return sorted.map(y => {
      const row = { years: y };
      results.forEach(r => {
        const pt = r.data.find(d => d.years === y);
        if (pt) {
          row[`${r.key}_V`] = pt.V_base;
          row[`${r.key}_Vpulse`] = pt.V_pulse;
          row[`${r.key}_SoC`] = pt.soc;
          row[`${r.key}_T`] = pt.temp;
          row[`${r.key}_Rint`] = pt.R_int_mOhm;
        }
      });
      return row;
    });
  }, [results]);

  const recommendation = useMemo(() =>
    generateRecommendation(results, { durationYears, meanT, yearAmp, dayAmp, pulseCurrent_mA }),
    [results, durationYears, meanT, yearAmp, dayAmp, pulseCurrent_mA]);

  // Predict passivation per cell given shelf storage conditions
  const passivationPredictions = useMemo(() => {
    // Assume worst-case: storage at high end of temperature range
    const storageTemp = Math.max(25, meanT + yearAmp * 0.7);  // typically stored somewhere warm-ish
    return results.map(r => ({
      key: r.key,
      cell: r.cell,
      prediction: predictPassivation(r.cell, shelfMonths, storageTemp, pulseCurrent_mA),
    }));
  }, [results, shelfMonths, meanT, yearAmp, pulseCurrent_mA]);

  return (
    <div style={styles.layout} className="layout">
      <aside style={styles.controls} className="controls">
        <Section title="Project">
          <ProjectPanel
            builtin={BUILTIN_PROJECTS}
            userProjects={userProjects}
            current={currentProject}
            onLoad={handleProjectLoad}
            onSaveClick={() => setShowSaveDialog(true)}
            onDelete={handleDelete}
            onExport={handleExport}
            onImport={handleImport}
            saveStatus={saveStatus}
            isAutoSaved={currentProject && userProjects[currentProject]}
          />
          {showSaveDialog && (
            <SaveDialog
              name={saveName} setName={setSaveName}
              description={saveDescription} setDescription={setSaveDescription}
              onSave={handleSave} onCancel={() => { setShowSaveDialog(false); setSaveName(''); setSaveDescription(''); }}
            />
          )}
        </Section>

        <Section title="Cell selection">
          <label style={styles.toggleRow}>
            <input type="checkbox" checked={compareMode} onChange={e => setCompareMode(e.target.checked)} />
            <span>Compare alternatives in same family</span>
          </label>
          {!compareMode && (
            <select value={cellKey} onChange={e => setCellKey(e.target.value)} style={styles.select}>
              <optgroup label="D-cell options (single cell, 14–19 Ah)">
                <option value="ER34615">ER34615 — Bobbin D (19 Ah, low-rate)</option>
                <option value="ER34615M">ER34615M — Spiral D (14 Ah, high-rate)</option>
              </optgroup>
              <optgroup label="D-cell + HPC hybrid">
                <option value="ER34615_HPC1520">ER34615 + HPC1520 (small cap)</option>
                <option value="ER34615_HPC1530">ER34615 + HPC1530 (mid cap)</option>
                <option value="ER34615_HPC1550">ER34615 + HPC1550 (large + PPTC)</option>
              </optgroup>
              <optgroup label="A-cell pack (compact)">
                <option value="ER18505M_2P">ER18505M × 2P — Fanso spiral pack (7 Ah)</option>
              </optgroup>
            </select>
          )}
          {compareMode && (
            <div style={{...styles.hint, marginBottom: 8}}>
              Comparing <strong>{CELLS[cellKey]?.name}</strong> against its family alternatives.
              Select a different cell in the list below to switch family.
            </div>
          )}
          <div style={styles.cellGrid}>
            {Object.entries(CELLS).map(([k, c]) => (
              <details key={k} style={{...styles.cellCard, borderLeftColor: c.color,
                                        opacity: (k === cellKey || (compareMode && compareSetFor(cellKey).includes(k))) ? 1 : 0.55}}
                       open={k === cellKey}>
                <summary onClick={(e) => {
                  // Clicking the summary switches the selected cell without toggling the details
                  if (k !== cellKey) { e.preventDefault(); setCellKey(k); }
                }}>
                  <span className="chev">▸</span>
                  <span style={{...styles.dot, background: c.color, marginLeft: 6}} />
                  <span style={styles.cellName}>{c.name}</span>
                  {k === cellKey && <span style={{marginLeft: 'auto', fontSize: 9, color: c.color,
                                                   fontFamily: '"IBM Plex Mono", monospace',
                                                   letterSpacing: '0.1em'}}>◉ SELECTED</span>}
                </summary>
                <div style={{...styles.layman, borderLeftColor: c.color}}>{c.layman}</div>
                <div style={styles.spec}>{c.capacity_Ah_25C}Ah · {c.Imax_cont_mA}mA cont · {c.Imax_pulse_mA}mA pulse</div>
                <div style={styles.spec}>Internal R: {c.internalR_mOhm_25C}mΩ</div>
                {c.hpc_capacity_mAh && <div style={{...styles.spec, color: c.color}}>+ HPC {c.hpc_capacity_mAh}mAh buffer, ≥{c.loadV_5ohm}V @ 5Ω</div>}
                {c.supplier && <div style={{...styles.spec, fontSize: 10, color: '#666', marginTop: 6,
                                             fontStyle: 'italic'}}>{c.supplier}</div>}
              </details>
            ))}
          </div>
        </Section>

        <Section title="What's powering it">
          <select value={loadPreset} onChange={e => setLoadPreset(e.target.value)} style={styles.select}>
            <optgroup label="Simple single-pulse profiles">
              {Object.entries(LOAD_PRESETS).filter(([, p]) => p.category === 'simple').map(([k, p]) => (
                <option key={k} value={k}>{p.label}</option>
              ))}
            </optgroup>
            <optgroup label="LTE realistic (includes attach/TAU)">
              {Object.entries(LOAD_PRESETS).filter(([, p]) => p.category === 'lte-realistic').map(([k, p]) => (
                <option key={k} value={k}>{p.label}</option>
              ))}
            </optgroup>
            <optgroup label="Custom">
              {Object.entries(LOAD_PRESETS).filter(([, p]) => p.category === 'custom').map(([k, p]) => (
                <option key={k} value={k}>{p.label}</option>
              ))}
            </optgroup>
          </select>
          {LOAD_PRESETS[loadPreset]?.notes && (
            <div style={styles.presetNotes}>
              {LOAD_PRESETS[loadPreset].notes}
            </div>
          )}
          <Slider label="Idle current (sleep)" value={baseCurrent_uA} min={1} max={500} step={1}
                  unit="µA" onChange={v => { setBase(v); setLoadPreset('custom'); }} />
          <Slider label="Burst current" value={pulseCurrent_mA} min={10} max={3000} step={10}
                  unit="mA" onChange={v => { setPulseI(v); setLoadPreset('custom'); }} />
          <Slider label="Burst length" value={pulseDuration_s} min={0.1} max={30} step={0.1}
                  unit="s" onChange={v => { setPulseDur(v); setLoadPreset('custom'); }} />
          <Slider label="Time between bursts" value={pulsePeriod_s} min={60} max={86400} step={60}
                  unit="s" onChange={v => { setPulsePer(v); setLoadPreset('custom'); }}
                  display={v => v < 3600 ? `${v}s` : v < 86400 ? `${(v/3600).toFixed(1)}h` : `${(v/86400).toFixed(1)}d`} />
          <div style={styles.hint}>
            Average: {(baseCurrent_uA/1000 + pulseCurrent_mA*pulseDuration_s/pulsePeriod_s).toFixed(2)} mA
          </div>
        </Section>

        <Section title="Environment">
          <select value={tempPreset} onChange={e => setTempPreset(e.target.value)} style={styles.select}>
            {Object.entries(TEMP_PRESETS).map(([k, p]) => <option key={k} value={k}>{p.label}</option>)}
          </select>
          <Slider label="Average temp" value={meanT} min={-40} max={60} step={1} unit="°C" onChange={setMeanT} />
          <Slider label="Seasonal swing" value={yearAmp} min={0} max={30} step={0.5} unit="°C" onChange={setYearAmp} />
          <Slider label="Day/night swing" value={dayAmp} min={0} max={25} step={0.5} unit="°C" onChange={setDayAmp} />
          <div style={styles.hint}>
            {(meanT - yearAmp - dayAmp).toFixed(0)}°C to {(meanT + yearAmp + dayAmp).toFixed(0)}°C
          </div>
        </Section>

        <Section title="Deployment plan">
          <Slider label="Storage before deploy" value={shelfMonths} min={0} max={60} step={1} unit="mo" onChange={setShelfMonths} />
          <Slider label="Required lifespan" value={durationYears} min={1} max={25} step={1} unit="yr" onChange={setDuration} />
        </Section>

        <ModifiersSection modifiers={modifiers} setModifiers={setModifiers} />
      </aside>

      <main style={styles.main}>
        {showExportNag && (
          <ExportNagBanner
            meta={meta}
            projectCount={Object.keys(userProjects).length}
            onExport={handleExport}
            onDismiss={() => {
              const dismissed = { ...meta, unsavedChanges: 0, lastExportAt: meta.lastExportAt || new Date().toISOString() };
              setMeta(dismissed); saveMeta(dismissed); setShowExportNag(false);
            }}
          />
        )}
        <RecommendationBox rec={recommendation} />

        <div style={styles.resultsGrid}>
          {results.map(r => <ResultCard key={r.key} result={r} durationYears={durationYears} />)}

        <ChartPanel title="How long does the battery last?" subtitle="State of charge (fuel gauge) over time. When it reaches 0%, the battery is dead.">
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={mergedData} margin={{ top: 10, right: 20, left: 0, bottom: 20 }}>
              <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
              <XAxis dataKey="years" stroke="#888" tick={{ fill: '#888', fontSize: 11 }}
                     label={{ value: 'years', position: 'insideBottom', offset: -10, fill: '#666', fontSize: 11 }} />
              <YAxis domain={[0, 100]} stroke="#888" tick={{ fill: '#888', fontSize: 11 }} unit="%" />
              <Tooltip contentStyle={tooltipStyle} />
              <ReferenceLine y={10} stroke="#f0ad4e" strokeDasharray="2 2" label={{value: 'warning zone', fill: '#f0ad4e', fontSize: 10, position: 'right'}} />
              {results.map(r => (
                <Line key={r.key} type="monotone" dataKey={`${r.key}_SoC`} name={CELLS[r.key].shortName}
                      stroke={CELLS[r.key].color} strokeWidth={2} dot={false} isAnimationActive={false} />
              ))}
            </LineChart>
          </ResponsiveContainer>
        </ChartPanel>

        <ChartPanel title="Does it still deliver enough voltage?" subtitle="Solid = idle voltage. Dashed = voltage during a transmission burst. Below the red line (2.0V), the battery is officially dead.">
          <ResponsiveContainer width="100%" height={260}>
            <LineChart data={mergedData} margin={{ top: 10, right: 20, left: 0, bottom: 20 }}>
              <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
              <XAxis dataKey="years" stroke="#888" tick={{ fill: '#888', fontSize: 11 }} />
              <YAxis domain={[1.8, 3.8]} stroke="#888" tick={{ fill: '#888', fontSize: 11 }} unit="V" />
              <Tooltip contentStyle={tooltipStyle} />
              <ReferenceLine y={2.0} stroke="#d9534f" strokeDasharray="4 4" strokeWidth={1}
                             label={{value: '2.0V cutoff', fill: '#d9534f', fontSize: 10, position: 'right'}} />
              {results.map(r => (
                <Fragment key={r.key}>
                  <Line type="monotone" dataKey={`${r.key}_V`} stroke={CELLS[r.key].color} strokeWidth={2} dot={false} isAnimationActive={false} />
                  <Line type="monotone" dataKey={`${r.key}_Vpulse`} stroke={CELLS[r.key].color} strokeWidth={1.5} strokeDasharray="3 3" dot={false} isAnimationActive={false} />
                </Fragment>
              ))}
            </LineChart>
          </ResponsiveContainer>
        </ChartPanel>

        <ChartPanel title="The environment the battery lives in" subtitle="Temperature swings through the seasons and day/night.">
          <ResponsiveContainer width="100%" height={160}>
            <ComposedChart data={mergedData} margin={{ top: 10, right: 20, left: 0, bottom: 20 }}>
              <defs>
                <linearGradient id="tempFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#d9534f" stopOpacity={0.3} />
                  <stop offset="50%" stopColor="#f0ad4e" stopOpacity={0.15} />
                  <stop offset="100%" stopColor="#5bc0de" stopOpacity={0.3} />
                </linearGradient>
              </defs>
              <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
              <XAxis dataKey="years" stroke="#888" tick={{ fill: '#888', fontSize: 11 }} />
              <YAxis stroke="#888" tick={{ fill: '#888', fontSize: 11 }} unit="°C" />
              <Tooltip contentStyle={tooltipStyle} />
              <ReferenceLine y={0} stroke="#444" strokeDasharray="2 2" />
              <Area type="monotone" dataKey={`${results[0].key}_T`} stroke="#c97b4a" fill="url(#tempFill)" strokeWidth={1.5} isAnimationActive={false} />
            </ComposedChart>
          </ResponsiveContainer>
        </ChartPanel>

        <ChartPanel title="Internal resistance — evolving over life" subtitle="How much the battery 'pushes back' when current is drawn. Low = healthy. Rising sharply = near end-of-life. Early deployment starts low, climbs as cell ages, then spikes at end.">
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={mergedData} margin={{ top: 10, right: 20, left: 10, bottom: 20 }}>
              <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
              <XAxis dataKey="years" stroke="#888" tick={{ fill: '#888', fontSize: 11 }} />
              <YAxis stroke="#888" tick={{ fill: '#888', fontSize: 11 }} unit=" mΩ" />
              <Tooltip contentStyle={tooltipStyle} />
              {results.map(r => (
                <Line key={r.key} type="monotone" dataKey={`${r.key}_Rint`} name={CELLS[r.key].shortName}
                      stroke={CELLS[r.key].color} strokeWidth={2} dot={false} isAnimationActive={false} />
              ))}
            </LineChart>
          </ResponsiveContainer>
          <div style={{...styles.chartExplain}}>
            <strong>What you're looking at:</strong> As batteries age and discharge, the path the current takes through the cell gets harder (imagine a drain slowly clogging). This value tells you how much voltage will be "lost" inside the cell during a transmission. Spikes near end-of-life are the classic warning sign — plan your field replacements when the curve starts climbing steeply.
          </div>
        </ChartPanel>

        <PassivationPanel predictions={passivationPredictions} shelfMonths={shelfMonths} />

        <FeedbackPanel currentProject={currentProject} />

        <SimulatorNotes />
      </main>
    </div>
  );
}

// =============================================================================
// PHYSICS_V2 — Li-SOCl2 life prediction, calibrated against Saft datasheets
// =============================================================================
// Mechanisms:
//   1. Capacity integration with Peukert + temperature derating
//   2. Self-discharge (Arrhenius, doubles per 10°C)
//   3. Reversible passivation (grows in idle, breaks with pulses)
//   4. Permanent ageing (monotonic V-sag from LiCl layer growth + seal creep)
//      Rate calibrated so bobbin caps ~20yr, spiral ~10yr under typical use
//   5. Cold-pulse stress (accelerates ageing for non-HPC cells pulsing at cold)
//
// Validated against 10 anchor points from Saft datasheets + industry norms
// (see PHYSICS_V2.VALIDATION_RESULTS). All 10 pass within stated tolerance.
// =============================================================================

const PHYSICS_V2 = {};

PHYSICS_V2.sdFracPerDay = function(SD_pct_yr_25C, T_C) {
  const q10 = Math.pow(2.0, (T_C - 25.0) / 10.0);
  return (SD_pct_yr_25C / 100.0 / 365.0) * q10;
};

PHYSICS_V2.tempCapFactor = function(T_C, construction) {
  const anchors = construction === 'bobbin'
    ? [[-40, 0.55], [-20, 0.80], [0, 0.95], [20, 1.00], [60, 1.00]]
    : [[-40, 0.42], [-20, 0.72], [0, 0.92], [20, 1.00], [60, 1.00]];
  if (T_C <= anchors[0][0]) return anchors[0][1];
  if (T_C >= anchors[anchors.length-1][0]) return anchors[anchors.length-1][1];
  for (let i = 0; i < anchors.length - 1; i++) {
    const [t1, c1] = anchors[i];
    const [t2, c2] = anchors[i+1];
    if (t1 <= T_C && T_C <= t2) return c1 + (c2-c1)*(T_C-t1)/(t2-t1);
  }
  return 1.0;
};

PHYSICS_V2.irEffectiveMOhm = function(cell, SOC, T_C) {
  const socFactor = 1.0 + ((cell.IR_mOhm_eol / cell.internalR_mOhm_25C) - 1.0) * Math.pow(1-SOC, 2);
  const tempFactor = Math.exp((25.0 - T_C) / 30.0);
  return cell.internalR_mOhm_25C * socFactor * tempFactor;
};

PHYSICS_V2.tafelV = function(I_mA, T_C) {
  if (I_mA <= 1.0) return 0.0;
  const R = 8.314, F = 96485.0;
  const T_K = T_C + 273.15;
  const I0_25 = 0.1;
  const Ea = 30000.0;
  const I0 = Math.max(I0_25 * Math.exp(-Ea/R * (1/T_K - 1/298.15)), 0.001);
  return 0.5 * (R * T_K / F) * Math.log(Math.max(I_mA / I0, 1.01));
};

PHYSICS_V2.passivationRevGrowthPerDay = function(cell, T_C, idleFrac) {
  if (idleFrac <= 0.01) return 0.0;
  let tempFactor;
  if (T_C >= 25.0) {
    tempFactor = 1.0 + (T_C - 25.0) * 0.012;
  } else {
    tempFactor = 1.0 + (25.0 - T_C) * 0.025;  // worse at cold
  }
  return (cell.passivation_rev_V_max / cell.passivation_rev_tau_days) * idleFrac * tempFactor;
};

PHYSICS_V2.passivationRevDecayPerDay = function(cell, pulse_mA, dur_s, ppd, currentV) {
  if (ppd <= 0 || currentV <= 0) return 0.0;
  const strength = Math.min(1.0, pulse_mA / cell.Imax_pulse_mA) * Math.min(1.0, dur_s);
  return Math.min(currentV, currentV * 0.05 * ppd * strength);
};

PHYSICS_V2.permanentAgingPerDay = function(cell, T_C, pulse_I_mA, hasHPC) {
  let tempFactor;
  if (T_C >= 25.0) {
    tempFactor = Math.pow(2.0, (T_C - 25.0) / 15.0);
  } else {
    tempFactor = Math.max(0.7, 1.0 + (T_C - 25.0) * 0.012);
  }
  // Cold pulse stress
  let coldPulseStress = 0.0;
  if (T_C < 10.0 && pulse_I_mA > 50 && !hasHPC) {
    const coldDepth = (10.0 - T_C) / 30.0;
    const pulseStress = Math.min(1.5, pulse_I_mA / (cell.Imax_pulse_mA * 0.3));
    coldPulseStress = coldDepth * pulseStress;
  }
  return (cell.permanent_aging_V_per_year_25C || 0.1) / 365.0 * (tempFactor + coldPulseStress);
};

PHYSICS_V2.vPulse = function(cell, SOC, T_C, I_pulse_mA, pass_rev_V, pass_perm_V, hpc_SOC) {
  const OCV = cell.ocv * (0.92 + 0.08 * SOC);
  let IR_eff;
  if ((cell.hpc_capacity_mAh || 0) > 0 && hpc_SOC > 0.05) {
    IR_eff = cell.hpc_IR_mOhm;
  } else {
    IR_eff = PHYSICS_V2.irEffectiveMOhm(cell, SOC, T_C);
  }
  const V_IR = (I_pulse_mA / 1000.0) * (IR_eff / 1000.0);
  const V_tafel = PHYSICS_V2.tafelV(I_pulse_mA, T_C);
  return OCV - V_IR - V_tafel - pass_rev_V - pass_perm_V;
};

// Main simulator — returns { life_years, mode, trajectory: [..] }
PHYSICS_V2.simulate = function(cell, opts) {
  const {
    base_I_uA = 0, pulse_I_mA = 0, pulse_duration_s = 0, pulses_per_day = 0,
    T_mean_C = 20, T_yearly_amp = 0, shelf_months = 0, max_years = 30,
    coverage_retry_mult = 1.0, voltage_scaled_inrush = false,
  } = opts || {};
  
  const Q_mAh = cell.capacity_Ah_25C * 1000.0;
  let SOC = 1.0, pass_rev_V = 0.0, pass_perm_V = 0.0, hpc_SOC = 1.0;
  const I_peak = pulse_I_mA * (voltage_scaled_inrush ? 1.5 : 1.0);
  const hasHPC = (cell.hpc_capacity_mAh || 0) > 0;
  
  if (shelf_months > 0) {
    const shelfDays = Math.floor(shelf_months * 30);
    for (let i = 0; i < shelfDays; i++) {
      SOC -= PHYSICS_V2.sdFracPerDay(cell.selfDischarge_pctYear_25C, 25.0);
      pass_rev_V = Math.min(pass_rev_V + PHYSICS_V2.passivationRevGrowthPerDay(cell, 25.0, 1.0),
                             cell.passivation_rev_V_max);
      pass_perm_V += PHYSICS_V2.permanentAgingPerDay(cell, 25.0, 0, hasHPC);
    }
  }
  
  let day = 0;
  const maxDays = Math.floor(max_years * 365);
  const trajectory = [];
  
  while (day < maxDays && SOC > 0.10) {
    const yearFrac = (day % 365) / 365.0;
    const T_today = T_mean_C + T_yearly_amp * Math.sin(2 * Math.PI * (yearFrac - 0.25));
    
    const base_mAh = (base_I_uA / 1000.0) * 24.0;
    const pulse_mAh = pulse_I_mA * (pulse_duration_s / 3600.0) * pulses_per_day * coverage_retry_mult;
    const load_mAh = base_mAh + pulse_mAh;
    
    const tcap = PHYSICS_V2.tempCapFactor(T_today, cell.construction);
    const load_SOC_frac = load_mAh / (Q_mAh * Math.max(tcap, 0.1));
    const sd_frac = PHYSICS_V2.sdFracPerDay(cell.selfDischarge_pctYear_25C, T_today);
    SOC = Math.max(SOC - load_SOC_frac - sd_frac, 0.0);
    
    const active_s = pulse_duration_s * pulses_per_day * coverage_retry_mult;
    const idle_frac = Math.max(0, 1.0 - active_s / 86400.0);
    pass_rev_V += PHYSICS_V2.passivationRevGrowthPerDay(cell, T_today, idle_frac);
    pass_rev_V -= PHYSICS_V2.passivationRevDecayPerDay(cell, pulse_I_mA, pulse_duration_s,
                                                         pulses_per_day, pass_rev_V);
    pass_rev_V = Math.max(0, Math.min(pass_rev_V, cell.passivation_rev_V_max));
    
    pass_perm_V += PHYSICS_V2.permanentAgingPerDay(cell, T_today, pulse_I_mA, hasHPC);
    
    if (hasHPC) {
      const hpc_drain = pulse_mAh / cell.hpc_capacity_mAh;
      const recharge_s = 86400.0 / Math.max(pulses_per_day, 1);
      const recharge_frac = Math.min(1.0, recharge_s / 60.0);
      hpc_SOC = Math.min(1.0, hpc_SOC - hpc_drain + recharge_frac);
    }
    
    const Vp = PHYSICS_V2.vPulse(cell, SOC, T_today, I_peak, pass_rev_V, pass_perm_V, hpc_SOC);
    
    if (day % 30 === 0) {
      trajectory.push({ day, years: day/365, SOC, Vp, pass_rev_V, pass_perm_V });
    }
    
    if (Vp < cell.cutoffV && day > 14) {
      return {
        life_years: day / 365.0, mode: 'V_pulse',
        SOC_end: SOC, pass_rev_end: pass_rev_V, pass_perm_end: pass_perm_V,
        trajectory,
        // Capture inputs for provenance
        Vp_end: Vp,
      };
    }
    day++;
  }
  return {
    life_years: day / 365.0, mode: (SOC <= 0.10) ? 'capacity' : 'survived',
    SOC_end: SOC, pass_rev_end: pass_rev_V, pass_perm_end: pass_perm_V,
    trajectory,
  };
};

const TX_FREQUENCIES = [
  { key: '5min',   label: '5 min',     period_s: 300    },
  { key: '15min',  label: '15 min',    period_s: 900    },
  { key: '1hr',    label: '1 hour',    period_s: 3600   },
  { key: '4hr',    label: '4 hour',    period_s: 14400  },
  { key: 'daily',  label: 'daily',     period_s: 86400  },
  { key: 'weekly', label: 'weekly',    period_s: 604800 },
];

const COVERAGE_OPTIONS = {
  'good':       { label: 'Good (no retries)',                 multiplier: 1.0  },
  'fair':       { label: 'Fair (RSRP ~-105dBm, 2-3× retries)', multiplier: 2.4  },
  'poor-ce1':   { label: 'Poor (NB-IoT CE1, 8× reps)',         multiplier: 8.0  },
  'fringe-ce2': { label: 'Fringe (NB-IoT CE2, ~27×)',          multiplier: 27.0 },
};

function DesignPanel() {
  // --- Requirements state ---
  const [targetYears, setTargetYears] = useState(10);
  const [envPreset, setEnvPreset] = useState('melbourne-outdoor');
  const [envMeanT, setEnvMeanT] = useState(15);
  const [envYearAmp, setEnvYearAmp] = useState(10);
  const [envDayAmp, setEnvDayAmp] = useState(6);
  const [backhaul, setBackhaul] = useState('nbiot-nrf91');
  const [txFreq, setTxFreq] = useState('1hr');
  const [shelfMonths, setShelfMonths] = useState(6);
  const [coverage, setCoverage] = useState('good');
  const [analysing, setAnalysing] = useState(false);
  const [results, setResults] = useState(null);

  // Signature of current requirement inputs. Compared against results.signature
  // to detect whether the displayed results are stale (i.e. inputs changed
  // since last Analyse click). Stale state triggers a warning banner and a
  // visual cue on the Analyse button.
  const currentSignature = JSON.stringify({
    targetYears, envMeanT, envYearAmp, envDayAmp,
    backhaul, txFreq, shelfMonths, coverage,
  });
  const isStale = results && results.signature !== currentSignature;

  // Environment preset auto-populates temp sliders
  useEffect(() => {
    if (envPreset === 'custom') return;
    const p = DESIGN_ENVIRONMENTS[envPreset];
    if (p) { setEnvMeanT(p.meanT); setEnvYearAmp(p.yearAmp); setEnvDayAmp(p.dayAmp); }
  }, [envPreset]);

  // Auto re-analyse on ANY input change. Debounced 400ms so slider drags
  // don't fire dozens of runs. Only fires after the user has clicked
  // ANALYSE DESIGN at least once (so the initial empty state doesn't trigger
  // a blind first run). The first-time click lives on the big amber button.
  useEffect(() => {
    if (!results) return; // never auto-run until user's first manual analyse
    const t = setTimeout(() => {
      runAnalysis();
    }, 400);
    return () => clearTimeout(t);
    // Re-run when any sim-affecting input changes
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [targetYears, envMeanT, envYearAmp, envDayAmp,
      backhaul, txFreq, shelfMonths, coverage]);

  const runAnalysis = () => {
    // Capture signature AT CLICK TIME so the stamped signature matches the
    // inputs that were actually used for the run. Previously this used the
    // outer `currentSignature` which was closed-over from render time — fine
    // for the first click, but any re-click after state changes would stamp
    // results with a stale signature, making isStale permanently true.
    const signatureAtRun = JSON.stringify({
      targetYears, envMeanT, envYearAmp, envDayAmp,
      backhaul, txFreq, shelfMonths, coverage,
    });
    setAnalysing(true);
    // Defer to next tick so UI updates before heavy sim loop
    setTimeout(() => {
      const bh = DESIGN_BACKHAULS[backhaul];
      const covMult = COVERAGE_OPTIONS[coverage].multiplier;
      const targetFreq = TX_FREQUENCIES.find(f => f.key === txFreq);
      const tempProfile = { meanT: envMeanT, yearAmplitude: envYearAmp, dayAmplitude: envDayAmp };

      const modifiers = {
        voltageScaledModem: bh.voltageScaledModem,
        inrushMultiplier: 1.0,
        summerDutyBump: 0,
        coldStartThresh: null,
        coverageRetryMultiplier: covMult,
      };

      // Sweep: every cell × every TX frequency
      const scatterData = [];
      const cellBest = {};  // best achievable life per cell at target freq

      const SIM_DURATION_YRS = Math.max(targetYears * 1.5, 15);

      // Effective peak current demanded by this backhaul — used for pulse-rating check.
      // Uses the same 1.8× inrush cap as the voltage-scaled modem model to approximate
      // the worst-case current the cell actually has to deliver.
      const effectivePeakDemand_mA = bh.pulseCurrent_mA * (bh.voltageScaledModem ? 1.5 : 1.0);

      for (const [cellKey, cell] of Object.entries(CELLS)) {
        cellBest[cellKey] = { life: 0, freq: null, margin: -999, pulseFail: false, overPulse: false };

        // Pulse-rating enforcement: Saft/Tadiran/Long Sing datasheets are explicit that
        // pulse ratings are hard limits. Pulling beyond 1.2× the rated max causes
        // excessive voltage sag (beyond what our IR model predicts), accelerated
        // passivation, and in extreme cases permanent capacity loss. Cells flagged
        // overPulse are ranked last in the Design tab with an explicit warning —
        // even if V_pulse calc happens to stay above cutoff, the datasheet says
        // "don't do this" and we should surface that.
        const overPulse = effectivePeakDemand_mA > cell.Imax_pulse_mA * 1.2;
        const overPulseRatio = effectivePeakDemand_mA / cell.Imax_pulse_mA;

        for (const freq of TX_FREQUENCIES) {
          // Legacy sim runs for the Simulate tab's V-trace. The Design tab uses
          // PHYSICS_V2 for life estimation (see below) which is the calibrated
          // model. The two run side-by-side; PHYSICS_V2 is authoritative for life.
          const r = simulate({
            cellKey,
            baseCurrent_uA: bh.baseCurrent_uA,
            pulseCurrent_mA: bh.pulseCurrent_mA,
            pulseDuration_s: bh.pulseDuration_s,
            pulsePeriod_s: freq.period_s,
            tempProfile,
            durationYears: SIM_DURATION_YRS,
            shelfMonths,
            modifiers,
          });

          // === PHYSICS V2 LIFE MODEL (v3.8.8) ==========================
          // Calibrated physics-based simulation. State-variable sim at daily
          // timestep, integrates capacity depletion + self-discharge +
          // reversible passivation + permanent ageing, ends when V_pulse drops
          // below cutoff or SOC < 10%. Calibrated against 10 anchor points
          // from Saft datasheets + industry norms, all pass within tolerance.
          // See PHYSICS_V2.VALIDATION_RESULTS for the anchor suite.
          // =============================================================

          // Sim ceiling: 18 years. Nothing we model reliably predicts life
          // beyond this — Saft's own "5-20+yr" language is application range,
          // not a confident point estimate. Cells that "survive" the window
          // are flagged as indeterminate, NOT reported as 18yr.
          const SIM_CEILING_YRS = 18;
          const pulses_per_day = 86400 / freq.period_s;
          const physicsResult = PHYSICS_V2.simulate(cell, {
            base_I_uA: bh.baseCurrent_uA,
            pulse_I_mA: bh.pulseCurrent_mA,
            pulse_duration_s: bh.pulseDuration_s,
            pulses_per_day,
            T_mean_C: envMeanT,
            T_yearly_amp: envYearAmp,
            shelf_months: shelfMonths,
            max_years: SIM_CEILING_YRS,
            coverage_retry_mult: covMult,
            voltage_scaled_inrush: bh.voltageScaledModem || false,
          });

          let achievedLife = physicsResult.life_years;
          let limitingFactor, limitingSource;
          // A cell that doesn't fail within the sim window isn't "18 years" —
          // it's "we don't know". Mark it so UI shows ">18yr indeterminate".
          let survivedSimWindow = physicsResult.mode === 'survived';

          if (physicsResult.mode === 'V_pulse') {
            limitingFactor = 'V_pulse brownout';
            limitingSource = `Pulse voltage dropped below ${cell.cutoffV}V cutoff at year ${achievedLife.toFixed(1)}. Permanent ageing + SOC-dependent IR rise + passivation accumulation → device can no longer transmit reliably. Physical mechanism: LiCl layer growth over time (ref: Saft LS/LSH rated life, Ye 2023 ADT study).`;
          } else if (physicsResult.mode === 'capacity') {
            limitingFactor = 'energy capacity';
            limitingSource = `Capacity (${cell.capacity_Ah_25C} Ah) exhausted at year ${achievedLife.toFixed(1)}. Combined load + self-discharge integrated over time. Ref: Saft ${cell.chemistry} datasheet.`;
          } else {
            limitingFactor = 'indeterminate (beyond 18yr)';
            limitingSource = `Simulation ran the full ${SIM_CEILING_YRS}-year window at this duty without triggering V_pulse or capacity failure. Real cells have additional long-term mechanisms (seal creep, electrolyte ageing, stochastic failures) that this model does not capture. If your deployment actually needs >15 yr life on a single cell, prototype and field-age — no datasheet or sim will give you a confident answer past ~15 years.`;
          }

          // Legacy compat — keep old simulate() result for SOC chart (Simulate tab)
          // Still detect pulse brownout from old sim for consistency
          const pulseFailed = physicsResult.mode === 'V_pulse';

          // Three "cap" values for transparency (show in tooltip)
          // For physics v2 these are derived from the actual sim:
          const cap_mAh = cell.capacity_Ah_25C * 1000;
          const load_mAh_yr = ((bh.baseCurrent_uA / 1000) * 24 + 
                                bh.pulseCurrent_mA * (bh.pulseDuration_s/3600) * pulses_per_day * covMult) * 365;
          const SD_mAh_yr = (cell.selfDischarge_pctYear_25C / 100) * cap_mAh;
          const life_energy = load_mAh_yr > 0 ? cap_mAh / load_mAh_yr : 99;
          const life_sd = (load_mAh_yr + SD_mAh_yr) > 0 ? cap_mAh / (load_mAh_yr + SD_mAh_yr) : 99;
          // Rated is now derived from the physics (perm ageing rate → V_pulse collapse time)
          const life_rated = (cell.permanent_aging_V_per_year_25C &&
                               cell.permanent_aging_V_per_year_25C > 0 &&
                               isFinite(cell.permanent_aging_V_per_year_25C))
            ? (cell.OCV - cell.cutoffV - 0.15) / cell.permanent_aging_V_per_year_25C
            : 20;

          scatterData.push({
            cellKey,
            cellName: cell.shortName,
            cellColor: cell.color,
            freqKey: freq.key,
            freqLabel: freq.label,
            period_s: freq.period_s,
            life: achievedLife,
            survivedSimWindow,
            life_energy,
            life_sd,
            life_rated,
            limitingFactor,
            limitingSource,
            targetMet: achievedLife >= targetYears && !pulseFailed && !overPulse,
            pulseFailed,
            overPulse,
            overPulseRatio,
            isTargetFreq: freq.key === txFreq,
          });

          // Track best at target frequency
          if (freq.key === txFreq) {
            const margin = (achievedLife - targetYears) / targetYears;
            cellBest[cellKey] = {
              life: achievedLife, freq: freq.key, margin,
              pulseFail: pulseFailed, overPulse, overPulseRatio, survivedSimWindow,
              life_energy, life_sd, life_rated,
              limitingFactor, limitingSource,
            };
          }
        }
      }

      // Rank cells: overPulse cells last (datasheet-exceeding = unreliable),
      // Ranking priority (best → worst):
      //   1. Cells with a concrete predicted life that meets target (best margin first)
      //   2. Cells that "survived sim window" — indeterminate but at least ≥18yr
      //   3. Cells predicted below target (highest margin first = closest to passing)
      //   4. Cells that V_pulse brown out
      //   5. Cells that exceed datasheet pulse rating
      const ranked = Object.entries(cellBest)
        .map(([k, v]) => ({ cellKey: k, cellName: CELLS[k].shortName, fullName: CELLS[k].name, ...v }))
        .sort((a, b) => {
          if (a.overPulse !== b.overPulse) return a.overPulse ? 1 : -1;
          if (a.pulseFail !== b.pulseFail) return a.pulseFail ? 1 : -1;
          // "survived" cells count as passing-target-with-unknown-margin
          // Rank them after any cell that concretely passes, before any that fails
          const aPass = a.margin >= 0 || a.survivedSimWindow;
          const bPass = b.margin >= 0 || b.survivedSimWindow;
          if (aPass !== bPass) return aPass ? -1 : 1;
          // Within "passing" group: concrete > survived (precision beats indeterminacy)
          if (aPass && bPass) {
            if (a.survivedSimWindow !== b.survivedSimWindow)
              return a.survivedSimWindow ? 1 : -1;
          }
          return b.margin - a.margin;
        });

      // Top result verdict.
      const winner = ranked[0];
      let verdict, verdictColor, verdictHeadline;
      if (!winner) {
        verdict = 'INFEASIBLE';
        verdictColor = '#ff7a7a';
        verdictHeadline = `No viable cell for this scenario.`;
      } else if (winner.overPulse) {
        verdict = 'INFEASIBLE';
        verdictColor = '#ff7a7a';
        verdictHeadline = `Every cell in the library is pushed beyond its datasheet pulse rating by this ${effectivePeakDemand_mA.toFixed(0)}mA peak demand. Pick a lower-peak modem, add an HPC capacitor, or use a larger cell.`;
      } else if (winner.pulseFail) {
        verdict = 'INFEASIBLE';
        verdictColor = '#ff7a7a';
        verdictHeadline = `No cell holds V_pulse ≥ ${CELLS[winner.cellKey].cutoffV}V at ${bh.pulseCurrent_mA}mA ${COVERAGE_OPTIONS[coverage].label.split(' ')[0].toLowerCase()}-coverage pulses. Reduce peak current or pick a lower-impedance cell/HPC.`;
      } else if (winner.margin < -0.2) {
        verdict = 'INFEASIBLE';
        verdictColor = '#ff7a7a';
        verdictHeadline = `No cell gets close to ${targetYears} yr at ${targetFreq.label} TX in this environment.`;
      } else if (winner.margin < 0) {
        verdict = 'MARGINAL';
        verdictColor = '#f0ad4e';
        verdictHeadline = `Best option (${winner.fullName}) reaches ${winner.life.toFixed(1)} yr — ${Math.abs(winner.margin * 100).toFixed(0)}% short of target.`;
      } else if (winner.margin < 0.3) {
        verdict = 'MARGINAL';
        verdictColor = '#f0ad4e';
        verdictHeadline = `${winner.fullName} meets target (${winner.life.toFixed(1)} yr) but with only ${(winner.margin * 100).toFixed(0)}% margin.`;
      } else {
        verdict = 'ACHIEVABLE';
        verdictColor = '#7dd87d';
        verdictHeadline = `${winner.fullName} comfortably meets target with ${(winner.margin * 100).toFixed(0)}% margin (${winner.life.toFixed(1)} yr life).`;
      }

      // Generate design narrative
      const narrative = [];
      narrative.push(`**Target:** ${targetYears} year${targetYears > 1 ? 's' : ''} of field life at ${targetFreq.label} TX using ${bh.label}.`);
      narrative.push(`**Environment:** ${DESIGN_ENVIRONMENTS[envPreset]?.label || 'Custom'} (mean ${envMeanT}°C, yearly swing ±${envYearAmp}°C).`);
      narrative.push(`**Coverage:** ${COVERAGE_OPTIONS[coverage].label}.`);

      // "Feasible" = meets margin AND no pulse failure AND not exceeding datasheet pulse rating
      const feasibleCount = ranked.filter(r => r.margin >= 0 && !r.pulseFail && !r.overPulse).length;
      const pulseFailCount = ranked.filter(r => r.pulseFail).length;
      const overPulseCount = ranked.filter(r => r.overPulse).length;
      if (overPulseCount > 0) {
        narrative.push(`**Pulse-rating warning:** ${overPulseCount} cell${overPulseCount > 1 ? 's are' : ' is'} being pushed beyond the datasheet max pulse rating (I_pulse_rated × 1.2). Even if V_pulse calc stays above cutoff, accelerated passivation and capacity loss are likely — datasheet says don't do this.`);
      }
      if (pulseFailCount > 0) {
        narrative.push(`**V_pulse warning:** ${pulseFailCount} cell${pulseFailCount > 1 ? 's' : ''} brown out during transmission at this peak current — even if energy lasts, the device may reset on every TX.`);
      }
      if (feasibleCount === 0) {
        narrative.push(`**Recommendation:** None of the 6 cells meet this target. Consider reducing TX frequency, upgrading to a larger cell/HPC, or relaxing lifespan target.`);
      } else if (feasibleCount <= 2) {
        narrative.push(`**Recommendation:** Only ${feasibleCount} cell${feasibleCount > 1 ? 's' : ''} meet the target — tight design. Use ${winner.fullName}. Build in a spare cell allowance for variance.`);
      } else {
        narrative.push(`**Recommendation:** ${feasibleCount} cells feasible. ${winner.fullName} is the margin leader. For cost-optimised design, consider the cheapest feasible option; for robustness, pick the highest-margin.`);
      }

      setResults({
        verdict, verdictColor, verdictHeadline, narrative,
        ranked, scatterData,
        targetYears, targetFreq: targetFreq.label, backhaul: bh.label,
        signature: signatureAtRun,
      });
      setAnalysing(false);
    }, 50);
  };

  return (
    <div style={{...styles.layout, gridTemplateColumns: '380px 1fr'}} className="layout">
      <aside style={styles.controls} className="controls">
        <Section title="1 · Lifespan target">
          <Slider label="Target field life" value={targetYears} min={1} max={20} step={1}
                  unit="yr" onChange={setTargetYears} />
          <div style={styles.hint}>How long the device must work in the field before battery replacement.</div>
        </Section>

        <Section title="2 · Environment">
          <select value={envPreset} onChange={e => setEnvPreset(e.target.value)} style={styles.select}>
            {Object.entries(DESIGN_ENVIRONMENTS).map(([k, p]) => (
              <option key={k} value={k}>{p.label}</option>
            ))}
          </select>
          <Slider label="Mean temperature" value={envMeanT} min={-40} max={60} step={1} unit="°C"
                  onChange={v => { setEnvMeanT(v); setEnvPreset('custom'); }} />
          <Slider label="Yearly swing (±)" value={envYearAmp} min={0} max={25} step={1} unit="°C"
                  onChange={v => { setEnvYearAmp(v); setEnvPreset('custom'); }} />
          <Slider label="Daily swing (±)" value={envDayAmp} min={0} max={25} step={1} unit="°C"
                  onChange={v => { setEnvDayAmp(v); setEnvPreset('custom'); }} />
        </Section>

        <Section title="3 · Backhaul">
          <select value={backhaul} onChange={e => setBackhaul(e.target.value)} style={styles.select}>
