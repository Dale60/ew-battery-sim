function FeedbackPanel({ currentProject }) {
  const [items, setItems] = useState([]);
  const [newComment, setNewComment] = useState('');
  const [loading, setLoading] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [scope, setScope] = useState('all');  // 'all' | 'project' | 'general'

  const refresh = async () => {
    setLoading(true);
    try {
      // Fetch both general and project-specific; merge client-side
      const [generalList, projList] = await Promise.all([
        api.listFeedback(''),  // general
        currentProject ? api.listFeedback(currentProject) : Promise.resolve([]),
      ]);
      // Dedupe (general query returns general only now, but be defensive)
      const seen = new Set();
      const merged = [...generalList, ...projList].filter(f => {
        if (seen.has(f.id)) return false;
        seen.add(f.id); return true;
      }).sort((a, b) => b.created_at.localeCompare(a.created_at));
      setItems(merged);
    } catch (e) {
      console.error('feedback fetch failed', e);
    }
    setLoading(false);
  };

  useEffect(() => { refresh(); }, [currentProject]);

  const handleSubmit = async () => {
    if (!newComment.trim()) return;
    setSubmitting(true);
    try {
      await api.submitFeedback(currentProject || null, newComment);
      setNewComment('');
      await refresh();
    } catch (e) {
      alert('Submit failed: ' + e.message);
    }
    setSubmitting(false);
  };

  const handleStatusChange = async (id, status) => {
    const note = status === 'open' ? null :
      prompt('Resolution note (what was decided / done):', '') || '';
    if (note === null) return;  // user cancelled
    try {
      await api.updateFeedback(id, status, note);
      await refresh();
    } catch (e) { alert('Update failed: ' + e.message); }
  };

  const filtered = items.filter(f => {
    if (scope === 'all') return true;
    if (scope === 'project') return f.project_id === currentProject;
    if (scope === 'general') return f.project_id === null;
    return true;
  });

  const statusColors = {
    open: '#f0ad4e', accepted: '#7dd87d', rejected: '#888', implemented: '#6b9bd1',
  };

  return (
    <div style={styles.feedbackPanel}>
      <div style={styles.chartHead}>
        <div style={styles.chartTitle}>Model feedback</div>
        <div style={styles.chartSub}>
          Post comments about the model, the results, or deployment observations.
          Comments are NOT auto-applied to the physics — Dale/Kyle triage and decide what warrants a model update.
        </div>
      </div>

      <div className="plain-box">
        <div className="ptitle">How to use this</div>
        If you notice the simulator is under- or over-predicting, or a reviewer flags a missing factor (like the nRF91 voltage-scaled peak current that's now in v3.5), drop a note here. Include context: what conditions, what result, what you think should happen. Dale or Kyle review and decide whether to update the physics model, add a custom modifier, or mark it as not applicable.
      </div>

      <div style={styles.feedbackInput}>
        <textarea
          value={newComment} onChange={e => setNewComment(e.target.value)}
          placeholder={currentProject
            ? `Feedback on this project (${currentProject.startsWith('user-') ? 'saved project' : 'built-in'})…`
            : 'General model feedback (no project selected)…'}
          rows={3} style={styles.feedbackTextarea} />
        <div style={{display: 'flex', gap: 10, alignItems: 'center', marginTop: 8}}>
          <div style={{fontSize: 11, color: '#888', fontFamily: '"IBM Plex Mono", monospace'}}>
            {currentProject ? `→ project: ${currentProject.slice(0, 20)}${currentProject.length > 20 ? '…' : ''}` : '→ general model feedback'}
          </div>
          <div style={{flex: 1}} />
          <button onClick={handleSubmit} disabled={!newComment.trim() || submitting} style={styles.feedbackSubmit}>
            {submitting ? 'Submitting…' : 'Submit feedback'}
          </button>
        </div>
      </div>

      <div style={styles.feedbackFilterRow}>
        <span style={{fontSize: 10, color: '#666', letterSpacing: '0.1em',
                      fontFamily: '"IBM Plex Mono", monospace', textTransform: 'uppercase'}}>
          showing
        </span>
        {['all', 'general', 'project'].map(s => (
          <button key={s} onClick={() => setScope(s)}
                  disabled={s === 'project' && !currentProject}
                  style={{...styles.feedbackFilterBtn,
                          color: scope === s ? '#c97b4a' : '#666',
                          borderColor: scope === s ? '#c97b4a' : '#2a2a2a'}}>
            {s}
          </button>
        ))}
        <div style={{flex: 1}} />
        <span style={{fontSize: 10, color: '#666', fontFamily: '"IBM Plex Mono", monospace'}}>
          {filtered.length} {filtered.length === 1 ? 'item' : 'items'}
        </span>
      </div>

      {loading ? (
        <div style={{padding: 20, textAlign: 'center', color: '#666', fontSize: 12}}>loading…</div>
      ) : filtered.length === 0 ? (
        <div style={{padding: 20, textAlign: 'center', color: '#666', fontSize: 12}}>
          no feedback yet — be the first
        </div>
      ) : (
        <div style={styles.feedbackList}>
          {filtered.map(f => (
            <div key={f.id} style={{...styles.feedbackCard, borderLeftColor: statusColors[f.status]}}>
              <div style={styles.feedbackHead}>
                <strong style={{fontSize: 12, color: '#e8e8e8'}}>{f.author}</strong>
                <span style={{...styles.feedbackStatus, color: statusColors[f.status]}}>
                  ● {f.status}
                </span>
                <span style={{fontSize: 10, color: '#666', marginLeft: 'auto',
                              fontFamily: '"IBM Plex Mono", monospace'}}>
                  {new Date(f.created_at).toLocaleString()}
                </span>
              </div>
              {f.project_id && (
                <div style={styles.feedbackProject}>
                  project: {f.project_id === 'peer-review' ? 'peer review (pre-v3.5)' : f.project_id.slice(0, 30)}
                </div>
              )}
              <div style={styles.feedbackComment}>{f.comment}</div>
              {f.resolution_note && (
                <div style={styles.feedbackResolution}>
                  <div style={styles.feedbackResolutionTitle}>Resolution by {f.resolved_by}</div>
                  <div>{f.resolution_note}</div>
                </div>
              )}
              {f.status === 'open' && (
                <div style={styles.feedbackActions}>
                  <button onClick={() => handleStatusChange(f.id, 'accepted')} style={styles.feedbackActionBtn}>✓ Accept</button>
                  <button onClick={() => handleStatusChange(f.id, 'implemented')} style={styles.feedbackActionBtn}>✓✓ Implemented</button>
                  <button onClick={() => handleStatusChange(f.id, 'rejected')} style={styles.feedbackActionBtn}>✕ Reject</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SimulatorNotes() {
  return (
    <details style={styles.notes}>
      <summary style={{listStyle: 'none'}}>
        <span style={styles.notesTitle}><span className="chev">▸</span>  Technical notes (for the curious)</span>
      </summary>
      <ul style={styles.notesList}>
        <li><strong>Peukert derating:</strong> capacity scales as C = C_rated × min(1, (13.8mA/I)^0.437), fitted to Ultralife ER34615 datasheet. 4 datapoints, all within 6%.</li>
        <li><strong>Capacity vs temperature:</strong> ~100% @25°C, 95% @0°C, 80% @-20°C, 55% @-40°C.</li>
        <li><strong>Terminal voltage model (v3.1):</strong> V = OCV − I·R(T) − η_kinetic(I,T) − passivation_dip. Validated against 16 Ultralife V-vs-T points, RMS error 30 mV.</li>
        <li><strong>Kinetic overpotential (v3.1):</strong> Tafel form η = 0.108·(298K/T)^5.74·log10(I/0.43mA). Explains cold-temperature voltage sag beyond pure IR drop.</li>
        <li><strong>Voltage-scaled modem peak current (v3.5, peer review):</strong> I_pulse(V) = I_nominal × (3.6V / V_terminal), capped at 1.8×. Off by default; enable per project for constant-power loads (nRF91, Telit ME310, SIMCOM).</li>
        <li><strong>Internal resistance vs DoD (v3.1):</strong> dip-then-rise shape matching MDPI 2024 EIS — drops ~30% in mid-discharge as passivation breaks, climbs sharply past 80% DoD.</li>
        <li><strong>Internal resistance vs age:</strong> saturating growth, ~30% over 10yr at 25°C, Arrhenius-accelerated.</li>
        <li><strong>Self-discharge:</strong> ~1%/yr @25°C, doubles per +10°C.</li>
        <li><strong>Passivation (TMV):</strong> amplification 5.2× fitted to MDPI Fig. 15b (8913h @ 70°C → TMV 1.6V). Growth tau = 1.5yr at 25°C.</li>
        <li><strong>HPC assumptions:</strong> HLC-1020/1530 class — ~25mΩ ESR, 150-250mAh buffer, eliminates observable passivation.</li>
        <li><strong>Cutoff:</strong> 2.0V per EEMB/Tadiran datasheets.</li>
      </ul>
    </details>
  );
}

function PassivationPanel({ predictions, shelfMonths }) {
  const worstSeverity = predictions.reduce((worst, p) => {
    const order = { negligible: 0, moderate: 1, significant: 2, severe: 3 };
    return order[p.prediction.severity] > order[worst] ? p.prediction.severity : worst;
  }, 'negligible');

  const severityColors = {
    negligible: { bg: 'rgba(125, 216, 125, 0.08)', border: '#7dd87d', text: '#7dd87d' },
    moderate: { bg: 'rgba(240, 173, 78, 0.08)', border: '#f0ad4e', text: '#f0ad4e' },
    significant: { bg: 'rgba(255, 122, 122, 0.08)', border: '#ff7a7a', text: '#ff7a7a' },
    severe: { bg: 'rgba(217, 83, 79, 0.12)', border: '#d9534f', text: '#d9534f' },
  };

  return (
    <div style={styles.passivationPanel}>
      <div style={styles.chartHead}>
        <div style={styles.chartTitle}>Passivation prediction — "first transmission" readiness</div>
        <div style={styles.chartSub}>
          After sitting in storage, the first time you wake a Li-SOCl₂ cell up, the voltage temporarily dips before recovering. Stored longer or hotter = bigger dip. This section predicts whether your cells are ready to deploy out of the box.
        </div>
      </div>

      <div className="plain-box">
        <div className="ptitle">What passivation actually is</div>
        Li-SOCl₂ batteries have a special trick that lets them last 10+ years: the lithium inside forms a thin protective film (called a <em>passivation layer</em>) that stops the chemistry from slowly burning itself out. Great for shelf life — but the first time you try to pull current out, you have to punch through that film, which briefly drops the voltage. This dip is called the <strong>Transient Minimum Voltage (TMV)</strong>. If it drops below your device's brown-out threshold, your device fails to boot on first power-up — and you won't know until you're on-site.
      </div>

      <div style={styles.passivationGrid}>
        {predictions.map(p => {
          const c = severityColors[p.prediction.severity];
          const depass = recommendDepassivation(p.prediction, p.cell);
          return (
            <div key={p.key} style={{...styles.passivationCard, borderLeft: `3px solid ${c.border}`, background: c.bg}}>
              <div style={styles.passivationCardHead}>
                <div style={{...styles.dot, background: p.cell.color, marginRight: 8}} />
                <strong style={{fontSize: 12}}>{p.cell.name}</strong>
                <span style={{...styles.severityBadge, color: c.text, borderColor: c.border}}>
                  {p.prediction.severity}
                </span>
              </div>
              <div style={styles.passivationStats}>
                <div>
                  <div style={styles.passivationStatVal}>{p.prediction.dip_V}V</div>
                  <div style={styles.passivationStatLabel}>voltage dip</div>
                </div>
                <div>
                  <div style={styles.passivationStatVal}>{p.prediction.tmv_V}V</div>
                  <div style={styles.passivationStatLabel}>min voltage (TMV)</div>
                </div>
                <div>
                  <div style={styles.passivationStatVal}>{p.prediction.recovery_s}s</div>
                  <div style={styles.passivationStatLabel}>recovery time</div>
                </div>
              </div>
              <div style={styles.passivationExplain}>{p.prediction.explanation}</div>
              {depass && (
                <div style={styles.depassBox}>
                  <div style={styles.depassTitle}>📋 Depassivation recommended</div>
                  <div style={styles.depassLine}><strong>Before deployment:</strong> {depass.protocol}</div>
                  <div style={styles.depassLine}><strong>Verify:</strong> {depass.verification}</div>
                  <div style={styles.depassLine}><strong>In-field prevention:</strong> {depass.prevention}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
