              <option key={k} value={k}>{p.label}</option>
            ))}
          </select>
          <div style={styles.hint}>
            Sets realistic peak current ({DESIGN_BACKHAULS[backhaul]?.pulseCurrent_mA} mA) and active time ({DESIGN_BACKHAULS[backhaul]?.pulseDuration_s} s) for this technology.
          </div>
        </Section>

        <Section title="4 · TX frequency & coverage">
          <label style={{fontSize: 11, color: '#888', fontFamily: '"IBM Plex Mono", monospace',
                         display: 'block', marginBottom: 4}}>TX interval</label>
          <select value={txFreq} onChange={e => setTxFreq(e.target.value)} style={styles.select}>
            {TX_FREQUENCIES.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
          </select>
          <label style={{fontSize: 11, color: '#888', fontFamily: '"IBM Plex Mono", monospace',
                         display: 'block', marginTop: 10, marginBottom: 4}}>Coverage quality</label>
          <select value={coverage} onChange={e => setCoverage(e.target.value)} style={styles.select}>
            {Object.entries(COVERAGE_OPTIONS).map(([k, p]) => (
              <option key={k} value={k}>{p.label}</option>
            ))}
          </select>
        </Section>

        <Section title="5 · Pre-deployment">
          <Slider label="Shelf time before deploy" value={shelfMonths} min={0} max={36} step={1}
                  unit="mo" onChange={setShelfMonths} />
        </Section>

        <button onClick={runAnalysis} disabled={analysing}
                style={{
                  ...styles.feedbackSubmit, width: '100%', padding: '12px 16px',
                  fontSize: 12, marginTop: 8,
                  opacity: analysing ? 0.5 : 1,
                  // Pulse-y amber when inputs have changed since last run, so it's
                  // visually obvious the user needs to re-click to refresh results
                  background: isStale ? '#f0ad4e' : (styles.feedbackSubmit.background || '#c97b4a'),
                  animation: isStale ? 'pulse 1.8s ease-in-out infinite' : 'none',
                }}>
          {analysing
            ? 'ANALYSING…'
            : (isStale ? '▶ RE-ANALYSE (inputs changed)' : '▶ ANALYSE DESIGN')}
        </button>
      </aside>

      <main style={styles.main}>
        {!results && !analysing && (
          <div style={styles.designIntro}>
            <div style={styles.designIntroTitle}>Reverse design mode</div>
            <p>
              This tab works the <em>opposite</em> way to the Simulate tab. Instead of picking a cell and seeing how long
              it lasts, you state your <strong>requirements</strong> — target lifespan, environment, backhaul, TX frequency —
              and the tool tells you which cells are feasible, which are marginal, and which won't work.
            </p>
            <p>
              Good for answering questions like:
            </p>
            <ul style={styles.designIntroList}>
              <li><em>"Can we hit 10 years NB-IoT hourly TX in an NSW hay shed?"</em></li>
              <li><em>"If we drop to 4-hour TX, what cells become feasible?"</em></li>
              <li><em>"Is this Farmo deployment pushing the ER18505M pack too hard?"</em></li>
            </ul>
            <p style={{color: '#888', fontSize: 11, marginTop: 16}}>
              Fill in the 5 sections on the left, then click <strong>Analyse Design</strong>. The analysis sweeps all 6 cells ×
              6 TX frequencies = 36 simulations per run. Takes about a second.
            </p>
          </div>
        )}

        {analysing && (
          <div style={{...styles.designIntro, textAlign: 'center'}}>
            <div style={{fontSize: 14, color: '#c97b4a', fontFamily: '"IBM Plex Mono", monospace',
                         letterSpacing: '0.1em'}}>running 36 simulations…</div>
          </div>
        )}

        {results && (
          <>
            {(isStale || analysing) && (
              <div style={{
                padding: '6px 14px', marginBottom: 10,
                background: 'rgba(201, 123, 74, 0.08)',
                border: '1px solid rgba(201, 123, 74, 0.3)',
                color: '#c97b4a',
                fontSize: 11, fontFamily: '"IBM Plex Mono", monospace',
                letterSpacing: '0.05em',
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <span style={{
                  display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
                  background: '#c97b4a',
                  animation: 'pulse 1s infinite',
                }} />
                {analysing ? 'RE-ANALYSING…' : 'UPDATING…'}
              </div>
            )}
            <div style={{opacity: (isStale || analysing) ? 0.6 : 1, transition: 'opacity 0.2s'}}>
              <DesignValidation />
              <DesignVerdict results={results} />
              <DesignRecommendations results={results} />
              <DesignChart results={results} targetYears={results.targetYears} />
            </div>
          </>
        )}
      </main>
    </div>
  );
}

function DesignValidation() {
  // Validation anchors embedded at build time from PHYSICS_V2.VALIDATION_RESULTS.
  // Each anchor = one scenario where the physics model's prediction is checked
  // against a published Saft datasheet point or industry norm. Shown collapsed
  // by default with a pass count; user can expand to see the full table and
  // inspect the sources behind the model's confidence.
  const [expanded, setExpanded] = useState(false);
  const results = (PHYSICS_V2 && PHYSICS_V2.VALIDATION_RESULTS) || [];
  if (results.length === 0) return null;
  const nPass = results.filter(r => r.passed).length;
  const allPass = nPass === results.length;
  const borderColor = allPass ? '#7dd87d' : '#f0ad4e';

  return (
    <div style={{
      background: '#0f1a0f', border: '1px solid #1f3a1f',
      borderLeft: `3px solid ${borderColor}`,
      padding: '10px 14px', marginBottom: 14,
      fontSize: 11, fontFamily: '"IBM Plex Mono", monospace',
    }}>
      <div style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer'}}
           onClick={() => setExpanded(v => !v)}>
        <span style={{color: borderColor, fontSize: 14}}>{allPass ? '✓' : '⚠'}</span>
        <span style={{color: '#e8e8e8', fontWeight: 600, letterSpacing: '0.05em'}}>
          MODEL VALIDATION
        </span>
        <span style={{color: borderColor, letterSpacing: '0.05em'}}>
          {nPass}/{results.length} anchors passing
        </span>
        <span style={{color: '#666', flex: 1, textAlign: 'right', fontSize: 10}}>
          {expanded ? 'click to collapse ▲' : 'click to expand ▼'}
        </span>
      </div>
      {expanded && (
        <div style={{marginTop: 12, paddingTop: 10, borderTop: '1px solid #1f3a1f'}}>
          <div style={{color: '#aaa', fontSize: 10, marginBottom: 10,
                       fontFamily: 'system-ui, sans-serif', lineHeight: 1.5}}>
            Physics model v2 is calibrated against {results.length} anchor scenarios drawn from
            Saft datasheets (LS33600 bobbin D, LSH20 spiral D) and published application norms.
            Each anchor runs the same simulator you see in the Design tab and checks the
            predicted life falls within the expected band. Anchors span: nominal-load,
            low-rate, smart-meter duty, long-idle (permanent ageing test), low-duty bobbin,
            HPC hybrid, A-pack standard, A-pack cold, A-pack arctic.
          </div>
          <table style={{width: '100%', borderCollapse: 'collapse', fontSize: 10}}>
            <thead>
              <tr style={{borderBottom: '1px solid #1f3a1f', color: '#888',
                          textAlign: 'left', letterSpacing: '0.05em'}}>
                <th style={{padding: '4px 6px', width: 20}}></th>
                <th style={{padding: '4px 6px'}}>Scenario</th>
                <th style={{padding: '4px 6px', width: 110}}>Expected</th>
                <th style={{padding: '4px 6px', width: 110}}>Model</th>
              </tr>
            </thead>
            <tbody>
              {results.map((r, i) => (
                <tr key={i} style={{borderBottom: '1px solid #151515'}}>
                  <td style={{padding: '4px 6px',
                              color: r.passed ? '#7dd87d' : '#ff7a7a'}}>
                    {r.passed ? '✓' : '✗'}
                  </td>
                  <td style={{padding: '4px 6px', color: '#ccc'}}>
                    <div>{r.name}</div>
                    <div style={{color: '#666', fontSize: 9, marginTop: 2,
                                 fontFamily: 'system-ui, sans-serif'}}>
                      {r.src}
                    </div>
                  </td>
                  <td style={{padding: '4px 6px', color: '#888'}}>{r.expected}</td>
                  <td style={{padding: '4px 6px',
                              color: r.passed ? '#7dd87d' : '#ff7a7a'}}>
                    {r.got}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{marginTop: 10, color: '#666', fontSize: 10,
                       fontFamily: 'system-ui, sans-serif', lineHeight: 1.5}}>
            Sources: Saft LS33600 datasheet (Doc. 31007), Saft LSH20 datasheet (Doc. 31015-2),
            Saft LS/LSH range brochure (application life ranges), Ye 2023 (life prediction),
            Cheng 2016 (ADT study), Long Sing 2026 (cold-pulse derate), industry NB-IoT norms.
            See the "How this works" tab for the full Model Fidelity card.
          </div>
        </div>
      )}
    </div>
  );
}

                   letterSpacing: '0.2em', marginBottom: 8}}>
        ◉ {results.verdict}
      </div>
      <div style={{fontSize: 18, fontWeight: 300, color: '#e8e8e8', marginBottom: 14, lineHeight: 1.3}}>
        {results.verdictHeadline}

      {results.narrative.map((line, i) => (
        <div key={i} style={{fontSize: 13, color: '#c8c8c8', marginBottom: 6, lineHeight: 1.5}}
             dangerouslySetInnerHTML={{ __html: line.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e8e8e8">$1</strong>') }} />

function DesignRecommendations({ results }) {
  return (
    <div style={styles.feedbackPanel}>
      <div style={styles.chartHead}>
        <div style={styles.chartTitle}>Cell ranking at {results.targetFreq} TX</div>
        <div style={styles.chartSub}>
          ✓ = meets {results.targetYears}-year target. ⚡ = V_pulse brownout (device fails to TX
          long before then). ⛔ = exceeds datasheet pulse rating (unreliable regardless of sim).
          Failed cells are shown faded with strikethrough — they're in the list for
          comparison, not as options.
        </div>
      </div>
      <div style={{display: 'flex', flexDirection: 'column', gap: 8, marginTop: 14}}>
        {results.ranked.map((r, i) => {
          // Feasibility chain: overPulse > pulseFail > margin
          const meetsTarget = r.margin >= 0 && !r.pulseFail && !r.overPulse;
          const isDead = r.overPulse || r.pulseFail || !meetsTarget;
          const color = r.overPulse ? '#ff5a5a'
                      : r.pulseFail ? '#ff7a7a'
                      : meetsTarget ? (r.margin > 0.3 ? '#7dd87d' : '#f0ad4e')
                      : '#ff7a7a';
          const icon  = r.overPulse ? '⛔'
                      : r.pulseFail ? '⚡'
                      : meetsTarget ? (r.margin > 0.3 ? '✓' : '⚠')
                      : '✗';
          // Life label: "died at Xyr" for failed cells, plain life for passes
          let lifeLabel;
          if (r.survivedSimWindow) {
            lifeLabel = `>${r.life.toFixed(0)} yr`;
          } else if (r.pulseFail || r.overPulse) {
            lifeLabel = `dies ${r.life.toFixed(1)}yr`;
          } else {
            lifeLabel = `${r.life.toFixed(1)} yr`;
          }
          return (
            <div key={r.cellKey}
                 style={{...styles.feedbackCard, borderLeftColor: color,
                         padding: '10px 14px',
                         opacity: isDead ? 0.55 : 1.0,
                         background: isDead ? 'rgba(255,90,90,0.03)' : undefined}}>
              <div style={{display:'flex', alignItems:'center', gap:12}}>
                <span style={{fontSize: 16, color, width: 20, textAlign: 'center'}}>{icon}</span>
                <span style={{fontSize: 10, color:'#666', width: 20,
                              fontFamily:'"IBM Plex Mono",monospace'}}>#{i+1}</span>
                <strong style={{fontSize: 12, color: isDead ? '#999' : '#e8e8e8', flex: 1,
                                textDecoration: isDead ? 'line-through' : 'none',
                                textDecorationColor: isDead ? 'rgba(255,120,120,0.6)' : undefined}}>
                  {r.fullName}
                </strong>
                {r.overPulse && (
                  <span style={{fontSize: 9, color: '#ff5a5a', background: 'rgba(255,90,90,0.15)',
                                padding: '2px 6px', letterSpacing: '0.08em',
                                fontFamily: '"IBM Plex Mono", monospace'}}
                        title={`Peak demand ${(r.overPulseRatio * 100).toFixed(0)}% of datasheet max`}>
                    OVER PULSE RATING
                  </span>
                )}
                {r.pulseFail && !r.overPulse && (
                  <span style={{fontSize: 9, color: '#ff7a7a', background: 'rgba(255,122,122,0.12)',
                                padding: '2px 6px', letterSpacing: '0.08em',
                                fontFamily: '"IBM Plex Mono", monospace'}}>
                    V_PULSE FAIL
                  </span>
                )}
                {!meetsTarget && !r.pulseFail && !r.overPulse && (
                  <span style={{fontSize: 9, color: '#ff7a7a', background: 'rgba(255,122,122,0.12)',
                                padding: '2px 6px', letterSpacing: '0.08em',
                                fontFamily: '"IBM Plex Mono", monospace'}}>
                    BELOW TARGET
                  </span>
                )}
                {r.survivedSimWindow && (
                  <span style={{fontSize: 9, color: '#888', background: 'rgba(150,150,150,0.12)',
                                padding: '2px 6px', letterSpacing: '0.08em',
                                fontFamily: '"IBM Plex Mono", monospace'}}
                        title="Sim ran to ceiling without failure — real-world limit unknown">
                    BEYOND MODEL
                  </span>
                )}
                <span style={{fontSize: 12, color, fontFamily:'"IBM Plex Mono",monospace',
                              letterSpacing: '0.05em',
                              textDecoration: isDead ? 'line-through' : 'none',
                              textDecorationColor: isDead ? 'rgba(255,120,120,0.6)' : undefined}}>
                  {lifeLabel}
                </span>
                <span style={{fontSize: 11, color: '#888', fontFamily:'"IBM Plex Mono",monospace',
                              width: 70, textAlign: 'right'}}>
                  {r.survivedSimWindow ? '—' : (r.margin >= 0 ? '+' : '') + (r.margin * 100).toFixed(0) + '%'}
                </span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DesignChart({ results, targetYears }) {
  // Chart style selector. Three views of the same 36-sim sweep:
  //   scatter: one dot per (cell × freq), good for seeing the whole feasibility envelope
  //   line:    connected per cell across freqs, shows life-vs-freq curves clearly
  //   bar:     horizontal bars at the USER'S chosen freq only, cleanest "which cell" view
  const [chartStyle, setChartStyle] = useState('scatter');

  // Cell visibility toggle. Starts with all cells visible; clicking a legend
  // entry toggles that cell on/off. Helps when the scatter gets crowded and
  // user wants to compare just 2-3 cells (e.g. HPC variants side-by-side).
  const allCellKeys = Object.keys(CELLS);
  const [visibleCells, setVisibleCells] = useState(() =>
    Object.fromEntries(allCellKeys.map(k => [k, true]))
  );
  const toggleCell = (k) => setVisibleCells(prev => ({ ...prev, [k]: !prev[k] }));
  const setAllCells = (val) =>
    setVisibleCells(Object.fromEntries(allCellKeys.map(k => [k, val])));
  const anyHidden = allCellKeys.some(k => !visibleCells[k]);

  // Chart Y-axis ceiling: capped at 18yr because nothing we realistically
  // model can be trusted beyond that. Cells that "survive" longer in the sim
  // are flagged survivedSimWindow and shown as ">18yr" rather than a number.
  const Y_MAX = Math.min(18, Math.max(targetYears * 2, 12));

  const periodIndices = TX_FREQUENCIES.map((f, i) => ({ ...f, x: i }));
  const data = results.scatterData
    .filter(d => visibleCells[d.cellKey])
    .map(d => ({
      ...d,
      x: periodIndices.findIndex(p => p.key === d.freqKey),
      y: Math.min(d.life, Y_MAX),
    }));

  // Group by cell for line/scatter per-series rendering
  const byCell = {};
  for (const d of data) {
    if (!byCell[d.cellKey]) byCell[d.cellKey] = [];
    byCell[d.cellKey].push(d);
  }
  // Sort each cell's points by x so lines don't backtrack
  Object.values(byCell).forEach(arr => arr.sort((a, b) => a.x - b.x));

  // Bar-mode data: one row per cell, showing life at the user's target freq
  const barData = results.ranked
    .filter(r => visibleCells[r.cellKey])
    .map(r => ({
    name: CELLS[r.cellKey].shortName,
    cellKey: r.cellKey,
    life: Math.min(r.life, Y_MAX),   // clamp so bar doesn't exceed chart scale
    lifeRaw: r.life,                   // keep the real number for tooltip
    survivedSimWindow: r.survivedSimWindow,
    meetsTarget: r.margin >= 0 && !r.pulseFail && !r.overPulse,
    pulseFail: r.pulseFail,
    overPulse: r.overPulse,
    margin: r.margin,
    color: CELLS[r.cellKey].color,
    limitingFactor: r.limitingFactor,
    limitingSource: r.limitingSource,
    life_energy: r.life_energy,
    life_sd: r.life_sd,
    life_rated: r.life_rated,
  })).sort((a, b) => b.life - a.life);

  const customTooltip = ({ payload }) => {
    if (!payload || !payload[0]) return null;
    const d = payload[0].payload;

    // Colour code limiting factor
    const factorColor = d.limitingFactor === 'rated ceiling' ? '#a78bfa'
                      : d.limitingFactor === 'self-discharge' ? '#6cbbf2'
                      : d.limitingFactor === 'V_pulse brownout' ? '#ff7a7a'
                      : d.limitingFactor === 'beyond model scope' ? '#888'
                      : '#f0c674'; // energy capacity

    return (
      <div style={{background: '#131316', border: '1px solid #333', padding: '10px 12px',
                   fontSize: 11, fontFamily: '"IBM Plex Mono", monospace',
                   maxWidth: 340}}>
        <div style={{color: d.cellColor || d.color, fontWeight: 600, marginBottom: 4,
                     fontSize: 12}}>
          {d.cellName || d.name}
        </div>
        <div style={{color: '#e8e8e8', fontSize: 13, marginBottom: 8}}>
          {d.survivedSimWindow ? `>${d.life.toFixed(0)} yr` : `${d.life.toFixed(1)} yr`}
          {d.freqLabel && <span style={{color: '#888', fontSize: 11}}> @ every {d.freqLabel}</span>}
        </div>

        {/* Status flags */}
        {d.survivedSimWindow && (
          <div style={{color: '#888', marginBottom: 4,
                       fontFamily: 'system-ui, sans-serif', fontSize: 10, lineHeight: 1.4}}>
            ⚠ Sim ran to ceiling without failure — real-world ageing beyond this duty
            isn't fully characterised. Treat as ">{d.life.toFixed(0)}yr but don't count on it".
          </div>
        )}
        {d.overPulse && (
          <div style={{color: '#ff5a5a', marginBottom: 4}}>
            ⛔ exceeds datasheet pulse rating
          </div>
        )}
        {(d.pulseFailed || d.pulseFail) && (
          <div style={{color: '#ff7a7a', marginBottom: 4}}>⚡ V_pulse brownout</div>
        )}
        {typeof d.margin === 'number' && (
          <div style={{color: d.meetsTarget ? '#7dd87d' : '#ff7a7a', marginBottom: 6}}>
            {d.margin >= 0 ? '+' : ''}{(d.margin * 100).toFixed(0)}% vs target
            {d.meetsTarget ? ' ✓' : ' ✗'}
          </div>
        )}
        {typeof d.targetMet === 'boolean' && !d.overPulse && !d.pulseFailed && (
          <div style={{color: d.targetMet ? '#7dd87d' : '#ff7a7a', marginBottom: 6}}>
            {d.targetMet ? '✓ meets target' : '✗ below target'}
          </div>
        )}

        {/* Why this number — the 3-cap breakdown */}
        {d.limitingFactor && (
          <div style={{borderTop: '1px solid #2a2a2a', paddingTop: 6, marginTop: 4}}>
            <div style={{color: '#888', fontSize: 9, letterSpacing: '0.1em',
                         marginBottom: 4}}>LIMITED BY</div>
            <div style={{color: factorColor, fontWeight: 600, marginBottom: 4,
                         textTransform: 'uppercase', fontSize: 10, letterSpacing: '0.05em'}}>
              {d.limitingFactor}
            </div>
            {d.limitingSource && (
              <div style={{color: '#ccc', fontSize: 10, lineHeight: 1.4,
                           fontFamily: 'system-ui, sans-serif'}}>
                {d.limitingSource}
              </div>
            )}

            {/* Show all 3 caps for transparency */}
            {typeof d.life_energy === 'number' && (
              <div style={{marginTop: 8, paddingTop: 6, borderTop: '1px dashed #2a2a2a',
                           color: '#888', fontSize: 9, lineHeight: 1.6}}>
                energy: {typeof d.life_energy === 'number' && isFinite(d.life_energy) ? (d.life_energy > 99 ? '∞' : d.life_energy.toFixed(1) + 'yr') : '—'} &nbsp;·&nbsp;
                SD: {typeof d.life_sd === 'number' && isFinite(d.life_sd) ? (d.life_sd > 99 ? '∞' : d.life_sd.toFixed(1) + 'yr') : '—'} &nbsp;·&nbsp;
                rated: {typeof d.life_rated === 'number' && isFinite(d.life_rated) ? d.life_rated.toFixed(0) + 'yr' : '—'}
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  const targetIdx = TX_FREQUENCIES.findIndex(f => f.label === results.targetFreq);

  return (
    <div style={styles.feedbackPanel}>
      <div style={styles.chartHead}>
        <div style={{display: 'flex', alignItems: 'baseline', gap: 16, flexWrap: 'wrap'}}>
          <div style={{flex: 1, minWidth: 280}}>
            <div style={styles.chartTitle}>Feasibility envelope</div>
            <div style={styles.chartSub}>
              {chartStyle === 'scatter' && `All 36 simulations (6 cells × 6 TX freqs). Dashed line = ${targetYears}-year target. Vertical band = chosen freq (${results.targetFreq}).`}
              {chartStyle === 'line' && `Life-vs-TX-frequency curves per cell. Steeper = more sensitive to TX rate. Status of each cell shown in the ranked list above.`}
              {chartStyle === 'bar' && `Ranked life at your chosen TX frequency (${results.targetFreq}). Full status detail in the ranked list above.`}
            </div>
          </div>
          <div style={styles.chartStyleSwitcher}>
            {[
              {k: 'scatter', label: 'Scatter'},
              {k: 'line', label: 'Lines'},
              {k: 'bar', label: 'Bars'},
            ].map(opt => (
              <button key={opt.k}
                      onClick={() => setChartStyle(opt.k)}
                      style={{
                        ...styles.chartStyleBtn,
                        ...(chartStyle === opt.k ? styles.chartStyleBtnActive : {}),
                      }}>
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <ResponsiveContainer width="100%" height={340}>
        {chartStyle === 'scatter' && (
          <ScatterChart margin={{top: 20, right: 30, left: 0, bottom: 40}}>
            <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
            <XAxis type="number" dataKey="x" name="TX frequency"
                   domain={[-0.5, TX_FREQUENCIES.length - 0.5]}
                   ticks={TX_FREQUENCIES.map((_, i) => i)}
                   tickFormatter={(v) => TX_FREQUENCIES[v]?.label || ''}
                   stroke="#888" tick={{fill: '#888', fontSize: 11}}
                   label={{value: 'TX frequency', position: 'insideBottom', offset: -10,
                           fill: '#888', fontSize: 11}} />
            <YAxis type="number" dataKey="y" name="Life" domain={[0, Y_MAX]}
                   stroke="#888" tick={{fill: '#888', fontSize: 11}}
                   label={{value: 'Achievable life (yr)', angle: -90,
                           position: 'insideLeft', fill: '#888', fontSize: 11}} />
            <Tooltip content={customTooltip} />
            <ReferenceLine y={targetYears} stroke="#c97b4a" strokeDasharray="4 4"
                           label={{value: `target: ${targetYears}yr`, fill: '#c97b4a', fontSize: 10, position: 'right'}} />
            {targetIdx >= 0 && (
              <ReferenceLine x={targetIdx} stroke="#888" strokeDasharray="2 4" strokeOpacity={0.5} />
            )}
            {/* Custom scatter dots: visual status indicates failure mode.
                Solid = concrete pass. Hollow-with-X = V_pulse failed.
                Crossed = over pulse rating. Dashed-hollow = indeterminate. */}
            {Object.entries(byCell).map(([cellKey, pts]) => (
              <Scatter key={cellKey} name={CELLS[cellKey].shortName} data={pts}
                       fill={CELLS[cellKey].color}
                       shape={(props) => {
                         const { cx, cy, payload } = props;
                         const color = CELLS[cellKey].color;
                         if (cx == null || cy == null) return null;
                         const size = 6;
                         if (payload.overPulse) {
                           // Red X — hard disqualified
                           return (
                             <g>
                               <circle cx={cx} cy={cy} r={size} fill="none"
                                       stroke="#ff5a5a" strokeWidth={1.5} />
                               <line x1={cx - size*0.6} y1={cy - size*0.6}
                                     x2={cx + size*0.6} y2={cy + size*0.6}
                                     stroke="#ff5a5a" strokeWidth={1.5} />
                               <line x1={cx + size*0.6} y1={cy - size*0.6}
                                     x2={cx - size*0.6} y2={cy + size*0.6}
                                     stroke="#ff5a5a" strokeWidth={1.5} />
                             </g>
                           );
                         }
                         if (payload.pulseFailed) {
                           // Hollow circle outlined in cell colour
                           return <circle cx={cx} cy={cy} r={size} fill="none"
                                          stroke={color} strokeWidth={1.5} />;
                         }
                         if (payload.survivedSimWindow) {
                           // Dashed hollow
                           return <circle cx={cx} cy={cy} r={size} fill="none"
                                          stroke={color} strokeWidth={1.5}
                                          strokeDasharray="2 2" />;
                         }
                         if (!payload.targetMet) {
                           // Failed target but passed pulse — faded solid
                           return <circle cx={cx} cy={cy} r={size} fill={color}
                                          fillOpacity={0.4} stroke={color} />;
                         }
                         // Concrete pass — solid
                         return <circle cx={cx} cy={cy} r={size} fill={color} />;
                       }} />
            ))}
          </ScatterChart>
        )}

        {chartStyle === 'line' && (
          <LineChart margin={{top: 20, right: 30, left: 0, bottom: 40}}>
            <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
            <XAxis type="number" dataKey="x" name="TX frequency"
                   domain={[-0.5, TX_FREQUENCIES.length - 0.5]}
                   ticks={TX_FREQUENCIES.map((_, i) => i)}
                   tickFormatter={(v) => TX_FREQUENCIES[v]?.label || ''}
                   allowDuplicatedCategory={false}
                   stroke="#888" tick={{fill: '#888', fontSize: 11}}
                   label={{value: 'TX frequency', position: 'insideBottom', offset: -10,
                           fill: '#888', fontSize: 11}} />
            <YAxis type="number" domain={[0, Y_MAX]}
                   stroke="#888" tick={{fill: '#888', fontSize: 11}}
                   label={{value: 'Achievable life (yr)', angle: -90,
                           position: 'insideLeft', fill: '#888', fontSize: 11}} />
            <Tooltip content={customTooltip} />
            <ReferenceLine y={targetYears} stroke="#c97b4a" strokeDasharray="4 4"
                           label={{value: `target: ${targetYears}yr`, fill: '#c97b4a', fontSize: 10, position: 'right'}} />
            {targetIdx >= 0 && (
              <ReferenceLine x={targetIdx} stroke="#888" strokeDasharray="2 4" strokeOpacity={0.5} />
            )}
            {Object.entries(byCell).map(([cellKey, pts]) => (
              <Line key={cellKey} name={CELLS[cellKey].shortName} data={pts}
                    type="monotone" dataKey="y" stroke={CELLS[cellKey].color}
                    strokeWidth={2} dot={{r: 4, fill: CELLS[cellKey].color}}
                    activeDot={{r: 6}} isAnimationActive={false} />
            ))}
          </LineChart>
        )}

        {chartStyle === 'bar' && (
          <BarChart data={barData} layout="vertical"
                    margin={{top: 10, right: 50, left: 10, bottom: 20}}>
            <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
            <XAxis type="number" domain={[0, Y_MAX]}
                   stroke="#888" tick={{fill: '#888', fontSize: 11}}
                   label={{value: 'Achievable life (yr)', position: 'insideBottom',
                           offset: -5, fill: '#888', fontSize: 11}} />
            <YAxis type="category" dataKey="name" width={90}
                   stroke="#888" tick={{fill: '#e8e8e8', fontSize: 11,
                                         fontFamily: '"IBM Plex Mono", monospace'}} />
            <Tooltip content={customTooltip} cursor={{fill: 'rgba(201,123,74,0.06)'}} />
            <ReferenceLine x={targetYears} stroke="#c97b4a" strokeDasharray="4 4"
                           label={{value: `target: ${targetYears}yr`, fill: '#c97b4a',
                                   fontSize: 10, position: 'top'}} />
            <Bar dataKey="life" radius={[0, 2, 2, 0]}>
              {barData.map((entry, i) => (
                <Cell key={i} fill={entry.pulseFail ? '#5a2a2a' : entry.color}
                      stroke={entry.pulseFail ? '#ff7a7a' : 'none'}
                      strokeWidth={entry.pulseFail ? 1 : 0} />
              ))}
            </Bar>
          </BarChart>
        )}
      </ResponsiveContainer>

      {/* Custom legend — clickable entries toggle cell visibility on/off.
          Hidden cells get faded style and struck-through text. Double-click or
          the "show all"/"hide all" links reset. */}
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 14, alignItems: 'center',
        justifyContent: 'center', marginTop: 12, paddingTop: 10,
        borderTop: '1px solid #1a1a1a',
      }}>
        {allCellKeys.map(k => {
          const visible = visibleCells[k];
          const cellColor = CELLS[k].color;
          return (
            <button key={k} type="button"
                    onClick={() => toggleCell(k)}
                    style={{
                      background: 'transparent',
                      border: 'none',
                      padding: '3px 6px',
                      cursor: 'pointer',
                      display: 'flex', alignItems: 'center', gap: 6,
                      opacity: visible ? 1 : 0.35,
                      transition: 'opacity 0.15s',
                      fontFamily: 'system-ui, sans-serif',
                    }}
                    title={visible ? 'Click to hide' : 'Click to show'}>
              <span style={{
                width: 10, height: 10, borderRadius: '50%',
                background: visible ? cellColor : 'transparent',
                border: `2px solid ${cellColor}`,
                display: 'inline-block',
              }} />
              <span style={{
                fontSize: 12, color: visible ? '#e8e8e8' : '#666',
                textDecoration: visible ? 'none' : 'line-through',
              }}>
                {CELLS[k].shortName}
              </span>
            </button>
          );
        })}
        {anyHidden && (
          <button type="button" onClick={() => setAllCells(true)}
                  style={{
                    background: 'transparent', border: '1px solid #333',
                    color: '#888', padding: '3px 10px', cursor: 'pointer',
                    fontSize: 10, fontFamily: '"IBM Plex Mono", monospace',
                    letterSpacing: '0.08em', marginLeft: 8,
                  }}>
            SHOW ALL
          </button>
        )}
      </div>

      {/* Shape key — only shown in scatter mode where dot shapes encode status.
          In line mode dots are all solid (shape would conflict with line continuity),
          and in bar mode status is handled via strikethrough on the ranked list. */}
      {chartStyle === 'scatter' && (
        <div style={{
          display: 'flex', flexWrap: 'wrap', gap: 18, alignItems: 'center',
          justifyContent: 'center', marginTop: 10, padding: '8px 12px',
          background: 'rgba(255,255,255,0.02)',
          fontSize: 11, fontFamily: 'system-ui, sans-serif',
          color: '#aaa',
        }}>
          <span style={{color: '#666', letterSpacing: '0.05em', fontSize: 10,
                        fontFamily: '"IBM Plex Mono", monospace'}}>
            SHAPE KEY:
          </span>
          {/* Solid — pass */}
          <span style={{display: 'inline-flex', alignItems: 'center', gap: 6}}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="5" fill="#7dd87d" />
            </svg>
            meets target
          </span>
          {/* Faded solid — below target */}
          <span style={{display: 'inline-flex', alignItems: 'center', gap: 6}}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="5" fill="#7dd87d" fillOpacity="0.4"
                      stroke="#7dd87d" />
            </svg>
            below target
          </span>
          {/* Hollow — V_pulse fail */}
          <span style={{display: 'inline-flex', alignItems: 'center', gap: 6}}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="5" fill="none"
                      stroke="#ff7a7a" strokeWidth="1.5" />
            </svg>
            V_pulse brownout
          </span>
          {/* Red X — over pulse */}
          <span style={{display: 'inline-flex', alignItems: 'center', gap: 6}}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="5" fill="none"
                      stroke="#ff5a5a" strokeWidth="1.5" />
              <line x1="4" y1="4" x2="10" y2="10"
                    stroke="#ff5a5a" strokeWidth="1.5" />
              <line x1="10" y1="4" x2="4" y2="10"
                    stroke="#ff5a5a" strokeWidth="1.5" />
            </svg>
            over pulse rating
          </span>
          {/* Dashed hollow — indeterminate */}
          <span style={{display: 'inline-flex', alignItems: 'center', gap: 6}}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="5" fill="none"
                      stroke="#888" strokeWidth="1.5"
                      strokeDasharray="2 2" />
            </svg>
            indeterminate ({'>'}18yr)
          </span>
        </div>
      )}
    </div>
  );
}

// =============================================================================
// WHAT'S NEW RIBBON — collapsible banner showing version + latest changes.
// Uses localStorage keyed by VERSION_INFO.version so the ribbon expands by
// default for users who haven't seen the current version, and stays collapsed
// once they've clicked "Got it". Bumping VERSION_INFO.version re-triggers it.
// =============================================================================
function WhatsNewRibbon() {
  const storageKey = `ew_sim_seen_version_${VERSION_INFO.version}`;
  const [expanded, setExpanded] = useState(() => {
    try { return localStorage.getItem(storageKey) !== '1'; }
    catch(e) { return true; }
  });
  const dismiss = () => {
    try { localStorage.setItem(storageKey, '1'); } catch(e) {}
    setExpanded(false);
  };

  if (!expanded) {
    return (
      <div style={styles.whatsNewCollapsed} onClick={() => setExpanded(true)}>
        <span style={{color: '#c97b4a', fontFamily: '"IBM Plex Mono", monospace',
                      letterSpacing: '0.1em', fontSize: 10}}>
          v{VERSION_INFO.version} · {VERSION_INFO.released}
        </span>
        <span style={{color: '#666', marginLeft: 10, fontSize: 11}}>
          {VERSION_INFO.headline}
        </span>
        <span style={{color: '#888', marginLeft: 'auto', fontSize: 10,
                      fontFamily: '"IBM Plex Mono", monospace'}}>
          ▸ what's new
        </span>
      </div>
    );
  }

  return (
    <div style={styles.whatsNewExpanded}>
      <div style={styles.whatsNewHead}>
        <div>
          <span style={{color: '#c97b4a', fontFamily: '"IBM Plex Mono", monospace',
                        letterSpacing: '0.15em', fontSize: 10, fontWeight: 600}}>
            NEW IN v{VERSION_INFO.version}
          </span>
          <span style={{color: '#666', marginLeft: 12, fontSize: 10,
                        fontFamily: '"IBM Plex Mono", monospace'}}>
            released {VERSION_INFO.released}
          </span>
        </div>
        <button onClick={dismiss} style={styles.whatsNewDismiss}>
          GOT IT ✕
        </button>
      </div>
      <div style={{fontSize: 14, color: '#e8e8e8', marginTop: 6, marginBottom: 10, fontWeight: 300}}>
        {VERSION_INFO.headline}
      </div>
      <ul style={styles.whatsNewList}>
        {VERSION_INFO.details.map((d, i) => (
          <li key={i} style={{fontSize: 12, color: '#c8c8c8', lineHeight: 1.5, marginBottom: 4}}>{d}</li>
        ))}
      </ul>
    </div>
  );
}

function ExplainPanel() {
  return (
    <div style={styles.explainWrap}>
      <ExplainCard title="What these batteries actually are" color="#d4a574">
        <p>These are <strong>lithium thionyl chloride</strong> (Li-SOCl₂) cells — the kind of battery that powers water meters, security alarms, asset trackers, and remote sensors for 10+ years at a time. They're <strong>single-use</strong> (can't be recharged), but they hold huge amounts of energy and lose almost nothing sitting on a shelf.</p>
        <p>A standard D-cell alkaline battery gives you ~12,000 mAh at 1.5V. An ER34615 gives you ~19,000 mAh at 3.6V — that's about <strong>4× the total energy</strong> in the same physical size, and it stays fresh for a decade.</p>
      </ExplainCard>

      <ExplainCard title="The three flavours" color="#c97b4a">
        <p>All three are the same chemistry, but built differently inside:</p>
        <ul style={styles.explainList}>
          <li><strong style={{color: '#d4a574'}}>Bobbin (ER34615)</strong> — the most common. Lots of energy, slow delivery. Perfect for <strong>low-power sensors</strong> that send a short message occasionally.</li>
          <li><strong style={{color: '#c97b4a'}}>Spiral (ER34615M)</strong> — same size can, but the electrode is rolled up like a swiss roll instead of packed in solid. Less total energy, but <strong>10× faster delivery</strong>. Good for devices that need a lot of current right now (like a GSM modem).</li>
          <li><strong style={{color: '#6b9bd1'}}>Hybrid (ER34615 + HPC)</strong> — a bobbin battery paired with a small capacitor. The capacitor handles the bursts; the battery slowly recharges it between transmissions. <strong>Best of both worlds</strong> — long life AND strong pulses. Costs more.</li>
        </ul>
      </ExplainCard>

      <ExplainCard title="The four things that kill a battery" color="#f0ad4e">
        <p><strong>1. Your device drains it.</strong> Obvious. The more current you draw, the faster you run out of energy.</p>
        <p><strong>2. Pulling too much at once gives you less total energy.</strong> Counter-intuitive but true. If you pull current slowly, you get 19Ah. If you pull it fast, you might only get 8Ah — the chemistry literally can't keep up. This is called the <em>Peukert effect</em>, and this simulator handles it properly.</p>
        <p><strong>3. The battery slowly drains itself (even doing nothing).</strong> About 1% per year at normal temperature. Double that for every 10°C hotter. A battery in a hot shed in western NSW might lose 4% per year just sitting there.</p>
        <p><strong>4. Cold weather makes the voltage sag during transmission.</strong> At -40°C, the battery has the same total energy, but its internal resistance triples. When your device tries to pull 120mA for a LoRaWAN transmission, the voltage briefly drops — sometimes below the cutoff. The device sees a "dead" battery even though it has years of charge left.</p>
      </ExplainCard>

      <ExplainCard title="Internal resistance — the hidden bottleneck" color="#6b9bd1">
        <p><strong>Every battery has a bit of "friction" inside it.</strong> When current flows, some voltage is lost to this internal resistance — imagine a garden hose with a partial kink: water still flows, but at lower pressure than if the hose was clear.</p>
        <p>For Li-SOCl₂ cells, internal resistance does three things over the battery's life:</p>
        <ul style={styles.explainList}>
          <li><strong>Starts low on a fresh cell</strong> (~130mΩ for bobbin, ~45mΩ for spiral).</li>
          <li><strong>Rises slowly as the battery ages</strong>, roughly 30% over 10 years at room temp — doubling for every 10°C hotter the storage.</li>
          <li><strong>Spikes dramatically near end of life</strong> (2-10× the fresh value) as the chemistry products clog up the cell's internal pores.</li>
        </ul>
        <p><strong>Why you care:</strong> the internal resistance chart is the most reliable end-of-life warning you'll get. A steeply rising curve is the battery telling you "I have maybe 6-12 months left" — long before the voltage actually fails. For deployments where replacement is expensive (Balco, Shepherd-Hay, remote metering), watching this curve pays off.</p>
      </ExplainCard>

      <ExplainCard title="Passivation — why new batteries sometimes look 'dead'" color="#d4a574">
        <p><strong>Here's a weird one.</strong> A brand-new Li-SOCl₂ cell that's been sitting in a box for 6 months can show 3.67V on a multimeter, yet when you connect it to your sensor, the voltage briefly collapses to 2-3V and your device fails to boot. This is <strong>passivation</strong>, and it's the most common "why isn't this working?" gotcha.</p>
        <p><strong>What's going on:</strong> the same chemistry that makes these batteries last 10+ years — a protective film on the lithium anode — is a wall that current has to punch through when you first use the cell. Short storage = thin wall, easy punch-through, barely a dip. Long storage at high temperatures = thick wall, big dip, device sees a dead battery.</p>
        <p><strong>The passivation panel in the Simulate tab tells you:</strong></p>
        <ul style={styles.explainList}>
          <li><strong>How big the voltage dip will be</strong> (TMV, or Transient Minimum Voltage) given your storage time and environment.</li>
          <li><strong>Whether your device will survive that dip</strong> or need depassivation first.</li>
          <li><strong>The depassivation protocol</strong> — a specific load current and duration that punches through the film safely before you deploy.</li>
        </ul>
        <p><strong>The punchline:</strong> if you're buying cells in bulk and storing them before deployment, you need to either (a) use them within 3-6 months, (b) depassivate them on a bench before field install, or (c) use the Hybrid (HPC) variant, where the capacitor handles the first pulse so the battery doesn't have to.</p>
      </ExplainCard>

      <ExplainCard title="How to read the charts" color="#6b9bd1">
        <p><strong>State of Charge chart</strong> — the battery's fuel gauge over years. 100% at the start, 0% when dead. If a line doesn't reach your required lifespan, that battery option won't make it.</p>
        <p><strong>Voltage chart</strong> — two lines per battery. The <strong>solid line</strong> is voltage when your device is idle (sleeping). The <strong>dashed line</strong> is voltage during a transmission burst, when current spikes. If the dashed line dips below the red 2.0V line, your device will malfunction during that burst — even if the solid line is fine.</p>
        <p><strong>Temperature chart</strong> — just shows the environment the battery is sitting in. Seasons create the slow wave; day/night creates the ripple on top.</p>
      </ExplainCard>

      <ExplainCard title="Choosing a battery — quick decision guide" color="#7dd87d">
        <p><strong>My device is a simple sensor that sends a message occasionally.</strong> → <strong>Bobbin</strong>. Cheapest, longest-lived, plenty good for LoRaWAN.</p>
        <p><strong>My device has a cellular modem (NB-IoT or GSM).</strong> → <strong>Hybrid</strong>, especially for deployments in cold climates or long-shelf situations. The capacitor stops the voltage collapsing during the modem's current spikes.</p>
        <p><strong>My device draws continuous power (always-on receiver, motor).</strong> → <strong>Spiral</strong>, and plan for shorter life — you're in the Peukert zone.</p>
        <p><strong>It will sit in stock for months before deployment.</strong> → Any option is fine, but factor 6-12 months of shelf time into the lifespan calculation. Hot warehouses eat battery faster.</p>
        <p><strong>It's going somewhere very cold (-30°C and below).</strong> → <strong>Hybrid</strong> is almost mandatory. Plain bobbin or spiral will have voltage collapse during transmissions.</p>
      </ExplainCard>

      <ExplainCard title="Saving your own projects" color="#7dd87d">
        <p>You'll often be running the same calculation repeatedly — e.g. "how long will an Optima Pulse last at the Balco site?" — with only minor variations. Rather than setting all the sliders each time, use <strong>Save as new</strong> in the top-left panel.</p>
        <p><strong>Built-in projects</strong> are provided for each Eden Worth product family as a starting point. Select one, tweak as needed, then save a new copy under a specific deployment name (e.g. "Optima Pulse · Farmo Yea silo").</p>
        <p><strong>Auto-save:</strong> once you've saved a project and it's loaded, any changes you make to the sliders are automatically saved back to that project after ~2 seconds. A small indicator shows "saving…" then "auto-saved" so you know it took. Built-in projects are read-only — make changes there and use <em>Save as new</em> to preserve them.</p>
        <p><strong>Shared storage (v3.4 hosted):</strong> projects are stored in a database on the Eden Worth VPS. Everyone on the team sees the same projects. When Kyle saves a new "Farmo · Yea silo" project, it appears in your list next time you refresh. Each save is versioned — the last 50 changes per project are kept, tagged with who made them. No more browser-local silos.</p>
        <p><strong>Last-used restore:</strong> the tool remembers which project you were last working on and auto-loads it when you reopen the tab.</p>
        <p><strong>Export / Import</strong> is still available — useful for archiving a snapshot to Confluence or sharing a specific set of projects with a customer or supplier. Export emits a JSON file; Import merges it into the server database (duplicates get overwritten).</p>
      </ExplainCard>

      <ExplainCard title="Model fidelity — what's physics vs what's approximation" color="#f0ad4e">
        <p>
          This simulator is grounded in published Li-SOCl₂ behaviour, but it's an engineering
          approximation — not a surrogate for benchtop testing. Before using results to commit
          to a deployment, read this section.
        </p>

        <p style={{marginTop: 12, color: '#e8e8e8', fontWeight: 600}}>What's modelled well (cross-checked against datasheet curves):</p>
        <ul style={styles.explainList}>
          <li><strong>Peukert capacity dropoff at moderate current</strong> — fits Saft/Ultralife bobbin curves with ~6% RMS residual across 0.1–50 mA. Reliable for low-rate discharge.</li>
          <li><strong>Temperature-dependent capacity</strong> — 100% @ 25°C down to ~55% @ −40°C (low-rate). Matches Saft published tables within ~5%.</li>
          <li><strong>Pulse voltage sag via IR + Tafel overpotential</strong> — ~30 mV RMS fit across 16 test points in MDPI 2024 dataset.</li>
          <li><strong>Passivation rebuild during idle</strong> — tau ≈ 1.5 yr at 25°C, calibrated to MDPI Fig 15b.</li>
          <li><strong>Self-discharge</strong> — 1%/yr baseline (Long Sing/Saft spec), doubled per 10°C warmer.</li>
        </ul>

        <p style={{marginTop: 12, color: '#e8e8e8', fontWeight: 600}}>What's approximated or missing (design margin needed):</p>
        <ul style={styles.explainList}>
          <li>
            <strong>Cold pulse performance is under-derated.</strong> At −40°C, Li-SOCl₂ cells
            deliver only ~30% of room-temp pulse capacity (Long Sing). A 1A pulse that sags
            0.4V at +20°C can sag 0.9V at cold. The simulator handles the IR-at-cold part
            but doesn't aggressively model the additional electrolyte-viscosity collapse.
            Expect sub-zero field life to be <strong>15–30% shorter</strong> than predicted.
          </li>
          <li>
            <strong>No duty-cycle recovery penalty.</strong> Li-SOCl₂ needs ~30–60 s to recover
            fully from a high-current pulse. At TX rates below 5 min, the cell sits in a
            perpetually-depressed state and effective capacity drops 20–30% (source: Long Sing).
            Design tab results at 5-min TX are optimistic by roughly this factor.
          </li>
          <li>
            <strong>Pulse-rating enforcement is a 1.2× soft limit.</strong> Drawing significantly
            above the datasheet-rated pulse max causes accelerated passivation and permanent
            capacity loss, not just voltage sag. The simulator flags ⛔ OVER PULSE RATING when
            the effective peak exceeds 120% of the cell's datasheet spec, but does not
            quantify the life reduction — treat flagged cells as unreliable.
          </li>
          <li>
            <strong>Arctic / deep-cold scenarios are roughest.</strong> At −20°C sustained with
            pulse loads above 150 mA, real-world field life can be <strong>half or less</strong>
            of this simulator's prediction without HPC enhancement. Rule of thumb: for bobbin
            cells below 0°C mean temp with cellular pulses, halve the predicted life for
            planning.
          </li>
          <li>
            <strong>Individual cell variation.</strong> Saft spec ±10% batch variation. Simulator
            uses nominal capacity.
          </li>
          <li>
            <strong>Voltage delay after long warm storage.</strong> Cells stored &gt;1 yr at
            high temp can have a first-pulse brownout that proper depassivation mitigates.
            Not modelled — depassivation assumed.
          </li>
          <li>
            <strong>HPC capacitor ageing.</strong> The hybrid layer capacitor itself loses a
            few percent capacitance per decade. Not modelled.
          </li>
          <li>
            <strong>Parallel pack imbalance.</strong> The ER18505M ×2 pack assumes equal sharing;
            in reality one cell always leads discharge. Model uses halved IR which is
            approximately correct for a healthy balanced pack.
          </li>
        </ul>

        <p style={{marginTop: 12, color: '#e8e8e8', fontWeight: 600}}>References & source data:</p>
        <ul style={styles.explainList}>
          <li>Saft LSH20 datasheet — 13 Ah D-cell, 1.8 A continuous, 4 A pulse (high-rate spiral construction).</li>
          <li>Saft LS/LSH range brochure — LS bobbin designed for 5–150 mA pulse range, 5–20+ yr life; LSH spiral for 50 mA–2 A range, 2–10+ yr.</li>
          <li>Long Sing Technology — "Beyond 500 Wh/kg" article on temperature and pulse derating (2026).</li>
          <li>Ye et al. 2023 — <em>Life prediction of lithium thionyl chloride batteries based on pulse-load and accelerated degradation tests</em>, Quality and Reliability Engineering International.</li>
          <li>Cheng et al. 2016 — <em>Development of a lifetime prediction model for Li/SOCl₂ batteries based on accelerated degradation test</em>, Microelectronics Reliability 65.</li>
          <li>Ahotech 2026 application note — "IoT battery for extreme cold weather" — confirms NB-IoT 200–500 mA peak, LTE-M / 2G 1–3 A, and cold pulse derating heuristics used above.</li>
        </ul>

        <p style={{marginTop: 12, color: '#888', fontSize: 12}}>
          Bottom line: trust this simulator to within roughly <strong>±25% on life</strong>
          under moderate conditions, and to within a <strong>2× factor on harsh conditions</strong>
          (sub-zero, high peak current, sub-5-min TX). For any deployment pushing those limits,
          build a prototype and cold-chamber test before committing.
        </p>
      </ExplainCard>

      <ExplainCard title="Validation methodology" color="#888">
        <p>The <em>Validation</em> tab shows side-by-side plots of this simulator's voltage predictions against published datasheet curves for representative operating points. If you spot a &gt;10% deviation in a use case that matters to you, raise it in the Model Feedback panel and we'll investigate.</p>
      </ExplainCard>
    </div>
  );
}

function ValidatePanel() {
  const [selectedDataset, setSelectedDataset] = useState('ultralife-runtime');
  const [userData, setUserData] = useState(null);
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();

  const dataset = VALIDATION_DATASETS[selectedDataset];

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const lines = text.trim().split('\n');
        const parsed = lines.slice(lines[0].includes(',') && isNaN(parseFloat(lines[0].split(',')[0])) ? 1 : 0)
          .map(l => {
            const [x, y] = l.split(',').map(v => parseFloat(v.trim()));
            return { x, y };
          })
          .filter(p => !isNaN(p.x) && !isNaN(p.y));
        setUserData({ name: file.name, points: parsed });
      } catch (err) {
        alert('CSV parse failed: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  // Compute RMS residuals for runtime dataset
  const residualsAnalysis = useMemo(() => {
    if (dataset.type === 'runtime') {
      const points = (userData?.points || dataset.points).map(p => ({
        measured: p.y, x: p.x, predicted: dataset.simFn(p.x),
        pct_err: ((dataset.simFn(p.x) - p.y) / p.y * 100),
      }));
      const rms = Math.sqrt(points.reduce((s, p) => s + Math.pow((p.predicted - p.measured) / p.measured, 2), 0) / points.length) * 100;
      const maxErr = Math.max(...points.map(p => Math.abs(p.pct_err)));
      return { points, rms, maxErr };
    }
    return null;
  }, [dataset, userData]);

  const chartData = useMemo(() => {
    if (dataset.type === 'runtime') {
      const measuredPts = (userData?.points || dataset.points);
      const xMax = Math.max(...measuredPts.map(p => p.x)) * 1.2;
      const modelCurve = [];
      for (let i = 0; i < 100; i++) {
        const x = 0.1 + (i / 100) * xMax;
        modelCurve.push({ x, model: dataset.simFn(x) });
      }
      return { modelCurve, measuredPts };
    } else {
      // vtemp - each series is independent
      return null;
    }
  }, [dataset, userData]);

  return (
    <div style={styles.validateWrap}>
      <div className="plain-box">
        <div className="ptitle">What this tab is for</div>
        Compare the simulator's predictions against <strong>real published measurements</strong> from battery vendors. If the model closely matches vendor test data, you can trust it for deployment planning. If not, you know where not to trust it.
      </div>

      <div style={styles.valControlRow}>
        <label style={styles.valLabel}>Reference dataset:</label>
        <select value={selectedDataset} onChange={e => { setSelectedDataset(e.target.value); setUserData(null); }} style={{...styles.select, marginBottom: 0, flex: 1}}>
          {Object.entries(VALIDATION_DATASETS).map(([k, d]) => <option key={k} value={k}>{d.name}</option>)}
        </select>
      </div>

      <div style={styles.valDesc}>{dataset.description}</div>

      {dataset.type === 'runtime' && (
        <>
          <div style={styles.valChartPanel}>
            <div style={styles.chartTitle}>Runtime vs current · model vs measured</div>
            <div style={styles.chartSub}>Solid line = simulator prediction. Dots = measured datapoints from datasheet.</div>
            <ResponsiveContainer width="100%" height={340}>
              <ComposedChart margin={{ top: 15, right: 30, left: 10, bottom: 30 }}>
                <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
                <XAxis dataKey="x" type="number" scale="log" domain={[0.1, 300]} stroke="#888"
                       tick={{ fill: '#888', fontSize: 11 }}
                       label={{ value: dataset.xLabel, position: 'insideBottom', offset: -15, fill: '#888', fontSize: 11 }}
                       ticks={[0.1, 1, 10, 100]} />
                <YAxis domain={[0, 22]} stroke="#888" tick={{ fill: '#888', fontSize: 11 }}
                       label={{ value: dataset.yLabel, angle: -90, position: 'insideLeft', fill: '#888', fontSize: 11 }} />
                <Tooltip contentStyle={tooltipStyle} />
                <Line data={chartData.modelCurve} type="monotone" dataKey="model" stroke="#c97b4a" strokeWidth={2} dot={false} name="Simulator model" isAnimationActive={false} />
                <Scatter data={chartData.measuredPts.map(p => ({x:p.x, y:p.y}))} fill="#6b9bd1" name="Measured (vendor)" />
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          <ResidualsTable analysis={residualsAnalysis} />
        </>
      )}

      {dataset.type === 'vtemp' && (
        <VTempValidationChart dataset={dataset} />
      )}

      {dataset.type === 'passivation' && (
        <PassivationValidation dataset={dataset} />
      )}

      <div style={styles.valSection}>
        <div style={styles.valSectionTitle}>Add your own measurements</div>
        <div className="plain-box">
          <div className="ptitle">How to use</div>
          Got test data from your own bench or from a published graph? Paste it in CSV format (one "x,y" pair per line) and compare directly against the simulator. For the runtime dataset, format is <code style={styles.code}>current_mA, delivered_Ah</code>. First line can be a header or data.
          <br /><br />
          <strong>No bench equipment?</strong> Use <a href="https://apps.automeris.io/wpd/" target="_blank" style={{color: '#6b9bd1'}}>WebPlotDigitizer</a> (free) to click datapoints off any published graph and export as CSV.
        </div>
        <div
          className={`drop-zone ${dragging ? 'drag' : ''}`}
          onClick={() => fileRef.current?.click()}
          onDragEnter={e => { e.preventDefault(); setDragging(true); }}
          onDragOver={e => e.preventDefault()}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
        >
          {userData ? `✓ Using ${userData.name} (${userData.points.length} points) — click to replace` : 'Drop a CSV here, or click to choose a file'}
          <input type="file" ref={fileRef} accept=".csv,.txt" style={{display:'none'}}
                 onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
        </div>
        {userData && (
          <button onClick={() => setUserData(null)} style={styles.clearBtn}>Clear custom data</button>
        )}
      </div>
    </div>
  );
}

function PassivationValidation({ dataset }) {
  // For each anchor, run the model and compare
  const results = dataset.anchors.map(a => {
    const bobbin = CELLS['ER34615'];
    const pred = predictPassivation(bobbin, a.storageMonths, a.storageTemp, a.current_mA);
    return {
      ...a,
      predicted_TMV: pred.tmv_V,
      predicted_dip: pred.dip_V,
      filmMaturity: pred.filmMaturity,
      error_V: pred.tmv_V - a.observed_TMV,
    };
  });

  const rms = Math.sqrt(results.reduce((s, r) => s + r.error_V * r.error_V, 0) / results.length);
  const rms_mV = rms * 1000;
  const verdict = rms_mV < 200 ? 'excellent' : rms_mV < 400 ? 'good' : 'needs tuning';
  const verdictColor = rms_mV < 200 ? '#7dd87d' : rms_mV < 400 ? '#f0ad4e' : '#ff7a7a';

  return (
    <>
      <div style={styles.residualsBox}>
        <div style={styles.residualsTitle}>Passivation model calibration</div>
        <div style={styles.residualsStats}>
          <div><strong style={{fontSize: 22, color: verdictColor, fontFamily: '"IBM Plex Mono", monospace'}}>{rms_mV.toFixed(0)} mV</strong><br /><span style={styles.residualsSubLabel}>RMS error</span></div>
          <div><strong style={{fontSize: 22, color: '#e8e8e8', fontFamily: '"IBM Plex Mono", monospace'}}>{results.length}</strong><br /><span style={styles.residualsSubLabel}>anchor points</span></div>
          <div><strong style={{fontSize: 16, color: verdictColor, fontFamily: '"IBM Plex Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em'}}>{verdict}</strong><br /><span style={styles.residualsSubLabel}>verdict</span></div>
        </div>
        <table style={styles.residualsTable}>
          <thead>
            <tr>
              <th style={styles.th}>Scenario</th>
              <th style={styles.th}>Film maturity</th>
              <th style={styles.th}>Observed TMV</th>
              <th style={styles.th}>Predicted TMV</th>
              <th style={styles.th}>Error</th>
            </tr>
          </thead>
          <tbody>
            {results.map((r, i) => (
              <tr key={i}>
                <td style={{...styles.td, fontSize: 11}}>{r.label}</td>
                <td style={styles.td}>{(r.filmMaturity * 100).toFixed(0)}%</td>
                <td style={styles.td}>{r.observed_TMV.toFixed(2)}V</td>
                <td style={styles.td}>{r.predicted_TMV.toFixed(2)}V</td>
                <td style={{...styles.td, color: Math.abs(r.error_V) < 0.15 ? '#7dd87d' : Math.abs(r.error_V) < 0.30 ? '#f0ad4e' : '#ff7a7a'}}>
                  {r.error_V > 0 ? '+' : ''}{r.error_V.toFixed(2)}V
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={styles.plainInline}>
          <strong>What this means:</strong> The model predicts the minimum voltage (TMV) during first transmission within {rms_mV.toFixed(0)}mV of the MDPI anchor point — the most extreme real measurement we have. Under more typical storage conditions (3-12 months at ambient temperature), predictions should be better than this. Note: this is calibrated against just 2 published points; confidence would improve with more anchor data, which is why the "Validation" tab supports CSV imports.
        </div>
      </div>
    </>
  );
}

function VTempValidationChart({ dataset }) {
  // For each current level, compute simulator prediction across temps and compare
  const seriesData = dataset.series.map(s => {
    const merged = s.points.map(p => {
      // simulate terminal voltage at this current & temperature
      const cell = CELLS['ER34615'];
      const tempProfile = { meanT: p.x, yearAmplitude: 0, dayAmplitude: 0 };
      const V_sim = terminalVoltage(1.0, s.current_mA, p.x, 1e6, cell, null);
      return { x: p.x, measured: p.y, model: parseFloat(V_sim.toFixed(3)) };
    });
    const rms = Math.sqrt(merged.reduce((sum, p) => sum + Math.pow(p.model - p.measured, 2), 0) / merged.length);
    return { ...s, data: merged, rms: rms * 1000 };  // mV
  });

  return (
    <>
      <div style={styles.valChartPanel}>
        <div style={styles.chartTitle}>Terminal voltage vs temperature</div>
        <div style={styles.chartSub}>Lines with circles = measured datapoints. Lines with crosses = simulator predictions at the same points.</div>
        <ResponsiveContainer width="100%" height={360}>
          <LineChart margin={{ top: 15, right: 30, left: 10, bottom: 30 }}>
            <CartesianGrid stroke="#2a2a2a" strokeDasharray="2 4" />
            <XAxis dataKey="x" type="number" domain={[-50, 70]} stroke="#888" tick={{ fill: '#888', fontSize: 11 }}
                   label={{ value: '°C', position: 'insideBottom', offset: -15, fill: '#888', fontSize: 11 }} />
            <YAxis domain={[2.7, 3.8]} stroke="#888" tick={{ fill: '#888', fontSize: 11 }}
                   label={{ value: 'V', angle: -90, position: 'insideLeft', fill: '#888', fontSize: 11 }} />
            <Tooltip contentStyle={tooltipStyle} />
            <Legend wrapperStyle={{fontSize: 11, paddingTop: 10}} />
            {seriesData.map(s => (
              <Fragment key={s.label}>
                <Line data={s.data} dataKey="measured" name={`${s.label} measured`} stroke={s.color} strokeWidth={2} dot={{r:4}} isAnimationActive={false} />
                <Line data={s.data} dataKey="model" name={`${s.label} model`} stroke={s.color} strokeWidth={1.5} strokeDasharray="4 3" dot={{r:3, fill: 'none', stroke: s.color}} isAnimationActive={false} />
              </Fragment>
            ))}
          </LineChart>
        </ResponsiveContainer>
      </div>

      <div style={styles.residualsBox}>
        <div style={styles.residualsTitle}>Accuracy per current level (lower is better)</div>
        {seriesData.map(s => (
          <div key={s.label} style={styles.residualRow}>
            <span style={{color: s.color, fontWeight: 500, flex: '0 0 80px'}}>{s.label}</span>
            <span>RMS error: <strong>{s.rms.toFixed(0)} mV</strong></span>
            <span style={{color: s.rms < 100 ? '#7dd87d' : s.rms < 200 ? '#f0ad4e' : '#ff7a7a'}}>
              {s.rms < 100 ? 'excellent' : s.rms < 200 ? 'acceptable' : 'poor match'}
            </span>
          </div>
        ))}
      </div>
    </>
  );
}

      </div>
      <table style={styles.residualsTable}>
        <thead>

        <tbody>
          {points.map((p, i) => (
            <tr key={i}>
              <td style={styles.td}>{p.x}</td>
              <td style={styles.td}>{p.measured.toFixed(2)}</td>

function ResultCard({ result, durationYears }) {
  const { cell, deadYears, data, usable_mAh, initial_mAh, peukertFrac, avgCurrent_mA } = result;
  const final = data[data.length - 1];
  const survived = !deadYears || deadYears >= durationYears;
  const endSoC = final.soc;
  const endV = final.V_base;
  const usableAh = (usable_mAh / 1000).toFixed(1);
  const ratedAh = (initial_mAh / 1000).toFixed(1);
  const peukertLoss = ((1 - peukertFrac) * 100).toFixed(0);

  return (
    <div style={{...styles.resultCard, borderTop: `3px solid ${cell.color}`}}>
      <div style={styles.resultHead}>
        <div style={styles.resultName}>{cell.name}</div>
        <div style={{...styles.badge, background: survived ? '#1a3d1a' : '#3d1a1a', color: survived ? '#7dd87d' : '#ff7a7a'}}>
          {survived ? 'survives' : `dies @ ${deadYears.toFixed(1)}yr`}
        </div>
      </div>
      <div style={styles.resultStats}>
        <Stat label="end SoC" value={`${endSoC.toFixed(1)}%`} />
        <Stat label="end V" value={`${endV.toFixed(2)}V`} />
        <Stat label="life" value={survived ? `>${durationYears}yr` : `${deadYears.toFixed(1)}yr`} highlight={!survived} />
      </div>
      {peukertFrac < 0.99 && (
        <div style={styles.peukertNote}>
          <span style={{color: '#f0ad4e'}}>⚠ Peukert derating:</span> getting {usableAh}Ah of rated {ratedAh}Ah ({peukertLoss}% lost due to current draw)
        </div>
      )}
    </div>
  );
}
